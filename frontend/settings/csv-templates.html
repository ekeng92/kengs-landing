<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#0f1117" />
  <link rel="icon" type="image/svg+xml" href="../favicon.svg" />
  <title>CSV Templates — Keng's Landing</title>
  <link rel="stylesheet" href="../css/app-shell.css" />
  <style>
    :root {
      --bg:#0f1117; --surface:#1a1d27; --surface2:#222633; --surface3:#2a2e3b;
      --border:#2e3345; --border2:#3d4255;
      --text:#e2e4ea; --muted:#8b90a0; --text-dim:#5a5f72;
      --accent:#4ade80; --accent-dim:#1e4a35;
      --blue:#2563eb; --blue-light:#60a5fa;
      --negative:#f87171; --negative-dim:#4a1525;
      --warning:#fbbf24;
      --radius:10px; --radius-sm:6px;
      --shadow-card:0 2px 8px rgba(0,0,0,.25), 0 1px 2px rgba(0,0,0,.15);
      --shadow-card-hover:0 4px 16px rgba(0,0,0,.35), 0 2px 4px rgba(0,0,0,.2);
    }
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    body {
      font-family:system-ui,-apple-system,sans-serif;
      background:var(--bg); color:var(--text);
      font-size:14px; line-height:1.5; min-height:100vh;
      padding-bottom:80px;
    }

    /* Page header */
    .page-header {
      display:flex; align-items:center; gap:16px; padding:20px 24px 0;
      max-width:900px; margin:0 auto;
    }
    .back-link {
      color:var(--blue-light); text-decoration:none; font-size:13px;
      display:flex; align-items:center; gap:4px;
    }
    .back-link:hover { color:var(--text); }
    .page-header h1 { font-size:1.25rem; font-weight:600; }

    .container { max-width:900px; margin:0 auto; padding:16px 24px; }

    /* Action bar */
    .action-bar { display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; }
    .action-bar .count { color:var(--muted); font-size:.85rem; }

    /* Buttons */
    .btn {
      border:none; border-radius:var(--radius-sm); padding:9px 18px; cursor:pointer;
      font-weight:600; font-size:.85rem; transition:background .2s, box-shadow .2s, transform .15s;
    }
    .btn:active:not(:disabled) { transform:translateY(0); }
    .btn:disabled { opacity:.4; cursor:not-allowed; }
    .btn-primary {
      background:var(--accent-dim); color:var(--accent); border:1px solid #2f7c55;
    }
    .btn-primary:hover:not(:disabled) { background:#245a40; box-shadow:0 2px 8px rgba(74,222,128,.18); transform:translateY(-1px); }
    .btn-sm { padding:6px 12px; font-size:.8rem; }
    .btn-danger {
      background:var(--negative-dim); color:var(--negative); border:1px solid #7f1d1d;
    }
    .btn-danger:hover:not(:disabled) { background:rgba(127,29,29,.5); box-shadow:0 2px 8px rgba(248,113,113,.18); transform:translateY(-1px); }
    .btn-ghost {
      background:transparent; color:var(--muted); border:1px solid var(--border);
    }
    .btn-ghost:hover:not(:disabled) { background:var(--surface2); color:var(--text); }

    /* Template cards */
    .template-list { display:flex; flex-direction:column; gap:10px; }
    .template-card {
      background:var(--surface); border:1px solid var(--border); border-radius:var(--radius);
      padding:16px 20px; box-shadow:var(--shadow-card);
      transition:box-shadow .2s, border-color .2s, transform .2s;
      display:flex; align-items:center; gap:16px; flex-wrap:wrap;
    }
    .template-card:hover { box-shadow:var(--shadow-card-hover); border-color:#3a3f54; transform:translateY(-1px); }
    .template-info { flex:1; min-width:180px; }
    .template-name { font-weight:600; font-size:.95rem; margin-bottom:4px; display:flex; align-items:center; gap:8px; }
    .template-meta { font-size:.8rem; color:var(--muted); display:flex; flex-wrap:wrap; gap:8px; align-items:center; }
    .template-meta a { color:var(--blue-light); text-decoration:none; font-size:.78rem; }
    .template-meta a:hover { text-decoration:underline; }
    .template-actions { display:flex; gap:8px; flex-shrink:0; }

    /* Badges */
    .badge {
      display:inline-block; padding:2px 8px; border-radius:4px;
      font-size:.72rem; font-weight:600; text-transform:uppercase; letter-spacing:.04em;
    }
    .badge-booking { background:rgba(37,99,235,.15); color:var(--blue-light); }
    .badge-expense { background:rgba(251,191,36,.12); color:var(--warning); }
    .badge-builtin { background:rgba(139,144,160,.12); color:var(--muted); }

    /* Empty state */
    .empty-state {
      text-align:center; padding:60px 24px; color:var(--muted);
    }
    .empty-state .icon { font-size:48px; margin-bottom:12px; opacity:.4; }
    .empty-state p { font-size:.9rem; margin-bottom:16px; }

    /* Loading state */
    .loading { text-align:center; padding:48px; color:var(--muted); }
    .loading::after { content:''; display:inline-block; width:18px; height:18px; border:2px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin .6s linear infinite; margin-left:8px; vertical-align:middle; }
    @keyframes spin { to { transform:rotate(360deg); } }

    /* Modal overlay */
    .modal-overlay {
      position:fixed; inset:0; background:rgba(0,0,0,.6); z-index:500;
      display:none; align-items:center; justify-content:center; padding:24px;
    }
    .modal-overlay.open { display:flex; }
    .modal {
      background:var(--surface); border:1px solid var(--border); border-radius:14px;
      width:100%; max-width:640px; max-height:85vh; overflow-y:auto;
      box-shadow:0 8px 32px rgba(0,0,0,.5); padding:24px;
    }
    .modal h2 { margin:0 0 20px; font-size:1.1rem; }
    .modal-footer { display:flex; gap:10px; justify-content:flex-end; margin-top:20px; padding-top:16px; border-top:1px solid var(--border); }

    /* Form fields */
    .form-group { margin-bottom:16px; }
    .form-group label {
      display:block; font-size:.8rem; color:var(--muted); margin-bottom:6px;
      letter-spacing:.03em; text-transform:uppercase; font-weight:500;
    }
    .form-group input, .form-group select {
      width:100%; background:var(--surface2); color:var(--text);
      border:1px solid var(--border); border-radius:var(--radius-sm);
      padding:10px 12px; font-size:.88rem;
      transition:border-color .2s, box-shadow .2s;
    }
    .form-group input:focus, .form-group select:focus {
      outline:none; border-color:var(--accent);
      box-shadow:0 0 0 3px rgba(74,222,128,.12);
    }
    .form-group .hint { font-size:.75rem; color:var(--muted); margin-top:4px; }
    .form-group select { cursor:pointer; }

    /* Column map editor */
    .col-map-editor { border:1px solid var(--border); border-radius:var(--radius-sm); padding:12px; background:var(--bg); }
    .col-map-row {
      display:flex; gap:8px; align-items:center; margin-bottom:8px;
    }
    .col-map-row select, .col-map-row input {
      flex:1; background:var(--surface2); color:var(--text);
      border:1px solid var(--border); border-radius:var(--radius-sm);
      padding:8px 10px; font-size:.85rem;
    }
    .col-map-row select:focus, .col-map-row input:focus {
      outline:none; border-color:var(--accent);
      box-shadow:0 0 0 3px rgba(74,222,128,.12);
    }
    .col-map-row .remove-btn {
      background:none; border:none; color:var(--negative); cursor:pointer;
      font-size:1.1rem; padding:4px 8px; border-radius:4px;
      transition:background .15s;
    }
    .col-map-row .remove-btn:hover { background:var(--negative-dim); }
    .add-mapping-btn {
      background:none; border:1px dashed var(--border); color:var(--muted);
      border-radius:var(--radius-sm); padding:6px 12px; cursor:pointer;
      font-size:.8rem; width:100%; transition:border-color .2s, color .2s;
    }
    .add-mapping-btn:hover { border-color:var(--accent); color:var(--accent); }

    /* Row filter */
    .row-filter-group { display:flex; gap:8px; }
    .row-filter-group input { flex:1; }

    /* Confirm dialog */
    .confirm-overlay {
      position:fixed; inset:0; background:rgba(0,0,0,.6); z-index:600;
      display:none; align-items:center; justify-content:center; padding:24px;
    }
    .confirm-overlay.open { display:flex; }
    .confirm-box {
      background:var(--surface); border:1px solid var(--border); border-radius:var(--radius);
      padding:24px; max-width:400px; width:100%; box-shadow:0 8px 32px rgba(0,0,0,.5);
    }
    .confirm-box p { margin-bottom:16px; font-size:.9rem; }
    .confirm-box .actions { display:flex; gap:10px; justify-content:flex-end; }

    /* Responsive */
    @media (max-width:600px) {
      .page-header { padding:16px 16px 0; }
      .container { padding:12px 16px; }
      .template-card { flex-direction:column; align-items:flex-start; }
      .template-actions { width:100%; }
      .template-actions .btn { flex:1; text-align:center; }
      .col-map-row { flex-wrap:wrap; }
      .col-map-row select, .col-map-row input { min-width:0; }
      .row-filter-group { flex-direction:column; }
      .modal { margin:16px; max-height:90vh; }
    }

    /* Panel entrance */
    .template-card { opacity:0; transform:translateY(6px); animation:card-in .3s ease forwards; }
    @keyframes card-in { to { opacity:1; transform:translateY(0); } }
  </style>
</head>
<body>
  <header><h1>CSV Templates</h1></header>

  <div class="page-header">
    <a href="/settings/" class="back-link">‹ Settings</a>
    <h1>CSV Templates</h1>
  </div>

  <div class="container">
    <div class="action-bar">
      <span class="count" id="template-count"></span>
      <button class="btn btn-primary" id="create-btn" onclick="openCreateModal()">+ New Template</button>
    </div>

    <div id="template-list">
      <div class="loading">Loading templates</div>
    </div>
  </div>

  <!-- Create / Edit modal -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal">
      <h2 id="modal-title">New Template</h2>

      <div class="form-group">
        <label for="f-name">Template Name *</label>
        <input id="f-name" type="text" maxlength="200" placeholder="e.g. Chase Credit Card" />
      </div>

      <div class="form-group">
        <label for="f-entity-type">Entity Type *</label>
        <select id="f-entity-type" onchange="onEntityTypeChange()">
          <option value="expense">Expense</option>
          <option value="booking">Booking</option>
        </select>
      </div>

      <div class="form-group">
        <label for="f-amount-sign">Amount Sign</label>
        <select id="f-amount-sign">
          <option value="negative_is_debit">Negative is Debit</option>
          <option value="separate_columns">Separate Columns</option>
          <option value="always_positive">Always Positive</option>
        </select>
      </div>

      <div class="form-group">
        <label for="f-date-format">Date Format</label>
        <select id="f-date-format">
          <option value="auto">Auto-detect</option>
          <option value="MM/DD/YYYY">MM/DD/YYYY</option>
          <option value="YYYY-MM-DD">YYYY-MM-DD</option>
          <option value="DD/MM/YYYY">DD/MM/YYYY</option>
          <option value="M/D/YYYY">M/D/YYYY</option>
        </select>
      </div>

      <div class="form-group">
        <label for="f-source-url">Source URL (optional)</label>
        <input id="f-source-url" type="url" placeholder="https://example.com/export-page" />
        <div class="hint">Link to where you export CSVs from this source.</div>
      </div>

      <div class="form-group">
        <label>Column Mappings *</label>
        <div class="col-map-editor" id="col-map-editor">
          <div id="col-map-rows"></div>
          <button class="add-mapping-btn" type="button" onclick="addMappingRow()">+ Add Mapping</button>
        </div>
        <div class="hint">Map each logical field to the CSV column header name.</div>
      </div>

      <div class="form-group">
        <label>Row Filter (optional)</label>
        <div class="row-filter-group">
          <input id="f-filter-col" type="text" placeholder="Column name" />
          <input id="f-filter-vals" type="text" placeholder="Include values (comma-separated)" />
        </div>
        <div class="hint">Only import rows where the specified column matches one of the values.</div>
      </div>

      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
        <button class="btn btn-primary" id="save-btn" onclick="saveTemplate()">Save</button>
      </div>
    </div>
  </div>

  <!-- Delete confirmation -->
  <div class="confirm-overlay" id="confirm-overlay">
    <div class="confirm-box">
      <p id="confirm-msg">Delete this template?</p>
      <div class="actions">
        <button class="btn btn-ghost" onclick="closeConfirm()">Cancel</button>
        <button class="btn btn-danger" id="confirm-delete-btn">Delete</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/app-shell.js"></script>
  <script>
    // ── XSS helper ──────────────────────────────────────────────────
    function esc(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }

    // ── Logical fields per entity type ──────────────────────────────
    const FIELDS = {
      expense: ['date', 'amount', 'merchant', 'description', 'reference_id', 'category'],
      booking: ['confirmation_code', 'guest_name', 'check_in', 'check_out', 'nights',
                 'gross_revenue', 'cleaning_fee', 'platform_fee', 'tax', 'net_payout', 'type'],
    };

    let templates = [];
    let editingId = null;
    let workspaceId = null;

    // ── Init ────────────────────────────────────────────────────────
    document.addEventListener('DOMContentLoaded', async () => {
      const session = await Auth.requireLogin();
      if (!session) return;
      workspaceId = await Auth.getWorkspaceId();
      if (!workspaceId) {
        document.getElementById('template-list').innerHTML = '<div class="empty-state"><p>No workspace found.</p></div>';
        return;
      }
      await loadTemplates();
    });

    // ── Load templates ──────────────────────────────────────────────
    async function loadTemplates() {
      const listEl = document.getElementById('template-list');
      listEl.innerHTML = '<div class="loading">Loading templates</div>';

      try {
        const res = await Auth.apiFetch('/csv-templates?workspace_id=' + encodeURIComponent(workspaceId));
        if (!res.ok) throw new Error('Failed to load templates');
        const body = await res.json();
        templates = body.data || [];
        renderList();
      } catch (e) {
        listEl.innerHTML = '<div class="empty-state"><p>Failed to load templates.</p></div>';
      }
    }

    // ── Render ──────────────────────────────────────────────────────
    function renderList() {
      const listEl = document.getElementById('template-list');
      const countEl = document.getElementById('template-count');
      countEl.textContent = templates.length + ' template' + (templates.length !== 1 ? 's' : '');

      if (templates.length === 0) {
        listEl.innerHTML = `
          <div class="empty-state">
            <div class="icon">📄</div>
            <p>No templates yet. Create one or import a CSV to auto-detect.</p>
            <button class="btn btn-primary" onclick="openCreateModal()">+ New Template</button>
          </div>`;
        return;
      }

      listEl.innerHTML = '<div class="template-list">' + templates.map((t, i) => {
        const entityBadge = t.entity_type === 'booking'
          ? '<span class="badge badge-booking">Booking</span>'
          : '<span class="badge badge-expense">Expense</span>';
        const builtinBadge = t.is_builtin ? ' <span class="badge badge-builtin">Built-in</span>' : '';
        const mappingCount = t.column_map ? Object.keys(t.column_map).length : 0;
        const sourceLink = t.source_url
          ? ' <a href="' + esc(t.source_url) + '" target="_blank" rel="noopener noreferrer">source ↗</a>'
          : '';
        const editDisabled = t.is_builtin ? ' disabled title="Built-in templates cannot be edited"' : '';
        const deleteDisabled = t.is_builtin ? ' disabled title="Built-in templates cannot be deleted"' : '';

        return `
          <div class="template-card" style="animation-delay:${i * 0.04}s" data-id="${esc(t.id)}">
            <div class="template-info">
              <div class="template-name">${esc(t.name)} ${entityBadge}${builtinBadge}</div>
              <div class="template-meta">
                <span>${mappingCount} mapping${mappingCount !== 1 ? 's' : ''}</span>
                <span>${esc(t.date_format || 'auto')}</span>
                <span>${esc(formatAmountSign(t.amount_sign))}</span>
                ${sourceLink}
              </div>
            </div>
            <div class="template-actions">
              <button class="btn btn-ghost btn-sm" onclick="openEditModal('${esc(t.id)}')"${editDisabled}>Edit</button>
              <button class="btn btn-danger btn-sm" onclick="confirmDelete('${esc(t.id)}', '${esc(t.name)}')"${deleteDisabled}>Delete</button>
            </div>
          </div>`;
      }).join('') + '</div>';
    }

    function formatAmountSign(s) {
      if (s === 'negative_is_debit') return 'Neg=Debit';
      if (s === 'separate_columns') return 'Separate';
      if (s === 'always_positive') return 'Positive';
      return s || 'Neg=Debit';
    }

    // ── Column map editor ───────────────────────────────────────────
    function getFieldOptions() {
      const type = document.getElementById('f-entity-type').value;
      return FIELDS[type] || FIELDS.expense;
    }

    function addMappingRow(field, value) {
      const container = document.getElementById('col-map-rows');
      const row = document.createElement('div');
      row.className = 'col-map-row';

      const options = getFieldOptions();
      const optionsHtml = '<option value="">Select field</option>' +
        options.map(f => '<option value="' + esc(f) + '"' + (f === field ? ' selected' : '') + '>' + esc(f) + '</option>').join('');

      row.innerHTML =
        '<select class="map-field">' + optionsHtml + '</select>' +
        '<input class="map-col" type="text" placeholder="CSV column header" value="' + esc(value || '') + '" />' +
        '<button class="remove-btn" type="button" onclick="this.parentElement.remove()" title="Remove">✕</button>';
      container.appendChild(row);
    }

    function onEntityTypeChange() {
      const rows = document.querySelectorAll('#col-map-rows .col-map-row');
      const options = getFieldOptions();
      rows.forEach(row => {
        const sel = row.querySelector('.map-field');
        const current = sel.value;
        sel.innerHTML = '<option value="">Select field</option>' +
          options.map(f => '<option value="' + esc(f) + '"' + (f === current ? ' selected' : '') + '>' + esc(f) + '</option>').join('');
      });
    }

    function getColumnMap() {
      const map = {};
      document.querySelectorAll('#col-map-rows .col-map-row').forEach(row => {
        const field = row.querySelector('.map-field').value;
        const col = row.querySelector('.map-col').value.trim();
        if (field && col) map[field] = col;
      });
      return map;
    }

    // ── Modal ───────────────────────────────────────────────────────
    function resetForm() {
      document.getElementById('f-name').value = '';
      document.getElementById('f-entity-type').value = 'expense';
      document.getElementById('f-amount-sign').value = 'negative_is_debit';
      document.getElementById('f-date-format').value = 'auto';
      document.getElementById('f-source-url').value = '';
      document.getElementById('f-filter-col').value = '';
      document.getElementById('f-filter-vals').value = '';
      document.getElementById('col-map-rows').innerHTML = '';
    }

    function openCreateModal() {
      editingId = null;
      resetForm();
      addMappingRow();
      document.getElementById('modal-title').textContent = 'New Template';
      document.getElementById('modal-overlay').classList.add('open');
    }

    function openEditModal(id) {
      const t = templates.find(x => x.id === id);
      if (!t || t.is_builtin) return;
      editingId = id;

      document.getElementById('f-name').value = t.name || '';
      document.getElementById('f-entity-type').value = t.entity_type || 'expense';
      document.getElementById('f-amount-sign').value = t.amount_sign || 'negative_is_debit';
      document.getElementById('f-date-format').value = t.date_format || 'auto';
      document.getElementById('f-source-url').value = t.source_url || '';

      if (t.row_filter) {
        document.getElementById('f-filter-col').value = t.row_filter.column || '';
        document.getElementById('f-filter-vals').value = (t.row_filter.include || []).join(', ');
      } else {
        document.getElementById('f-filter-col').value = '';
        document.getElementById('f-filter-vals').value = '';
      }

      document.getElementById('col-map-rows').innerHTML = '';
      if (t.column_map) {
        Object.entries(t.column_map).forEach(([field, col]) => addMappingRow(field, col));
      }
      if (!t.column_map || Object.keys(t.column_map).length === 0) {
        addMappingRow();
      }

      document.getElementById('modal-title').textContent = 'Edit Template';
      document.getElementById('modal-overlay').classList.add('open');
    }

    function closeModal() {
      document.getElementById('modal-overlay').classList.remove('open');
      editingId = null;
    }

    // Close modal on overlay click
    document.getElementById('modal-overlay').addEventListener('click', function (e) {
      if (e.target === this) closeModal();
    });

    // Close modal on Escape
    document.addEventListener('keydown', function (e) {
      if (e.key === 'Escape') {
        closeModal();
        closeConfirm();
      }
    });

    // ── Save ────────────────────────────────────────────────────────
    async function saveTemplate() {
      const name = document.getElementById('f-name').value.trim();
      if (!name) { showToast('Template name is required.'); return; }

      const columnMap = getColumnMap();
      if (Object.keys(columnMap).length === 0) { showToast('At least one column mapping is required.'); return; }

      const sourceUrl = document.getElementById('f-source-url').value.trim() || null;
      if (sourceUrl) {
        try { new URL(sourceUrl); } catch { showToast('Source URL must be a valid URL.'); return; }
      }

      const filterCol = document.getElementById('f-filter-col').value.trim();
      const filterVals = document.getElementById('f-filter-vals').value.trim();
      let rowFilter = null;
      if (filterCol && filterVals) {
        rowFilter = { column: filterCol, include: filterVals.split(',').map(v => v.trim()).filter(Boolean) };
      }

      const payload = {
        name,
        entity_type: document.getElementById('f-entity-type').value,
        column_map: columnMap,
        amount_sign: document.getElementById('f-amount-sign').value,
        date_format: document.getElementById('f-date-format').value,
        source_url: sourceUrl,
        row_filter: rowFilter,
      };

      const saveBtn = document.getElementById('save-btn');
      saveBtn.disabled = true;
      saveBtn.textContent = 'Saving...';

      try {
        let res;
        if (editingId) {
          res = await Auth.apiFetch('/csv-templates/' + editingId, {
            method: 'PATCH',
            body: JSON.stringify(payload),
          });
        } else {
          payload.workspace_id = workspaceId;
          res = await Auth.apiFetch('/csv-templates', {
            method: 'POST',
            body: JSON.stringify(payload),
          });
        }

        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          throw new Error(err.error || 'Save failed');
        }

        showToast(editingId ? 'Template updated.' : 'Template created.');
        closeModal();
        await loadTemplates();
      } catch (e) {
        showToast(e.message || 'Failed to save template.');
      } finally {
        saveBtn.disabled = false;
        saveBtn.textContent = 'Save';
      }
    }

    // ── Delete ──────────────────────────────────────────────────────
    let pendingDeleteId = null;

    function confirmDelete(id, name) {
      const t = templates.find(x => x.id === id);
      if (!t || t.is_builtin) return;
      pendingDeleteId = id;
      document.getElementById('confirm-msg').textContent = 'Delete "' + name + '"? This cannot be undone.';
      document.getElementById('confirm-overlay').classList.add('open');
    }

    function closeConfirm() {
      document.getElementById('confirm-overlay').classList.remove('open');
      pendingDeleteId = null;
    }

    document.getElementById('confirm-overlay').addEventListener('click', function (e) {
      if (e.target === this) closeConfirm();
    });

    document.getElementById('confirm-delete-btn').addEventListener('click', async () => {
      if (!pendingDeleteId) return;
      const btn = document.getElementById('confirm-delete-btn');
      btn.disabled = true;
      btn.textContent = 'Deleting...';

      try {
        const res = await Auth.apiFetch('/csv-templates/' + pendingDeleteId, { method: 'DELETE' });
        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          throw new Error(err.error || 'Delete failed');
        }
        showToast('Template deleted.');
        closeConfirm();
        await loadTemplates();
      } catch (e) {
        showToast(e.message || 'Failed to delete template.');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Delete';
      }
    });
  </script>
</body>
</html>
