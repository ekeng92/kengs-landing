<!DOCTYPE html>
<!-- author: AEON Dev | created: 2026-04-19 | last updated: 2026-04-21 -->
<!-- Expense Import Review Queue — dark theme, simplified layout -->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#0f1117" />
  <link rel="icon" type="image/svg+xml" href="../favicon.svg" />
  <link rel="manifest" href="../manifest.json" />
  <title>Expense Import — Keng's Landing</title>
  <link rel="stylesheet" href="../css/app-shell.css" />
  <style>
    :root {
      --bg: #0f1117; --surface: #1a1d27; --surface2: #222633; --surface3: #2a2e3b;
      --border: #2e3345; --border2: #3d4255;
      --text: #e2e4ea; --text-muted: #8b90a0; --text-dim: #5a5f72;
      --accent: #2563eb; --accent-light: #60a5fa; --accent-dim: #1e3a5f;
      --positive: #4ade80; --positive-dim: #1e4a35;
      --negative: #f87171; --negative-dim: #4a1525;
      --warning: #fbbf24; --warning-dim: #3d2f0a;
      --radius: 10px; --radius-sm: 6px;
      --shadow-card: 0 2px 8px rgba(0,0,0,.25), 0 1px 3px rgba(0,0,0,.15);
      --shadow-card-hover: 0 4px 14px rgba(0,0,0,.35), 0 2px 4px rgba(0,0,0,.2);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg); color: var(--text);
      font-size: 14px; line-height: 1.5; min-height: 100vh;
    }

    /* Header */
    header {
      background: var(--surface); border-bottom: 1px solid var(--border);
      padding: 14px 24px; display: flex; align-items: center; gap: 16px;
      position: sticky; top: 0; z-index: 100;
    }
    .back-link {
      color: var(--accent-light); text-decoration: none; font-size: 13px;
      display: flex; align-items: center; gap: 4px;
    }
    .back-link:hover { color: var(--text); }
    header h1 { font-size: 1rem; font-weight: 600; }
    .header-meta { margin-left: auto; color: var(--text-muted); font-size: 0.82rem; }

    .container { max-width: 1100px; margin: 0 auto; padding: 24px 16px; }

    /* Upload zone */
    .upload-zone {
      background: var(--surface); border: 2px dashed var(--border);
      border-radius: var(--radius); padding: 56px 24px; text-align: center;
      cursor: pointer;
      transition: border-color 0.3s, background 0.3s, box-shadow 0.3s, transform 0.2s;
      box-shadow: var(--shadow-card);
      position: relative;
    }
    .upload-zone::before {
      content: '';
      position: absolute; inset: -2px; border-radius: calc(var(--radius) + 2px);
      background: linear-gradient(135deg, var(--accent), var(--accent-light), var(--accent));
      background-size: 200% 200%;
      opacity: 0; transition: opacity 0.4s;
      z-index: -1;
      animation: gradient-shift 3s ease infinite paused;
    }
    .upload-zone:hover::before, .upload-zone.drag-over::before {
      opacity: 1;
      animation-play-state: running;
    }
    @keyframes gradient-shift {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }
    .upload-zone:hover, .upload-zone.drag-over {
      border-color: transparent; background: var(--surface2);
      box-shadow: 0 0 20px rgba(37,99,235,.12), 0 0 0 1px rgba(37,99,235,.08), var(--shadow-card-hover);
      transform: translateY(-2px);
    }
    .upload-zone.drag-over {
      background: rgba(37,99,235,.06);
    }
    .upload-zone input[type=file] { display: none; }
    .upload-zone label { cursor: pointer; }
    .upload-zone .icon {
      font-size: 44px; margin-bottom: 14px; opacity: 0.5;
      transition: opacity 0.3s, transform 0.3s;
      display: inline-block;
    }
    .upload-zone:hover .icon {
      opacity: 0.85; transform: scale(1.12) translateY(-2px);
    }
    .upload-zone .title { font-weight: 600; font-size: 15px; margin-bottom: 4px; }
    .upload-zone .title span {
      text-decoration: underline transparent;
      text-underline-offset: 3px;
      transition: text-decoration-color 0.3s, color 0.3s;
    }
    .upload-zone:hover .title span {
      text-decoration-color: var(--accent-light);
    }
    .upload-zone .hint {
      color: var(--text-muted); font-size: 12px;
      letter-spacing: 0.2px; margin-top: 2px;
    }
    .upload-progress {
      display: none; margin-top: 16px; text-align: center;
      color: var(--text-muted); font-size: 13px;
    }
    .spinner {
      display: inline-block; width: 16px; height: 16px;
      border: 2px solid var(--border); border-top-color: var(--accent);
      border-radius: 50%; animation: spin 0.7s linear infinite;
      vertical-align: middle; margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Summary cards */
    .summary-grid {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 12px; margin-bottom: 20px;
    }
    .summary-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 14px 16px;
      box-shadow: var(--shadow-card);
      transition: transform 0.15s, box-shadow 0.15s, border-color 0.15s;
    }
    .summary-card:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-card-hover);
      border-color: var(--border2);
      border-left: 2px solid var(--accent);
    }
    .summary-card .label {
      font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase;
      letter-spacing: 0.5px; margin-bottom: 4px;
    }
    .summary-card .value { font-size: 1.4rem; font-weight: 700; }

    /* Action bar */
    .action-bar {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 14px; flex-wrap: wrap; gap: 10px;
    }
    .filter-group { display: flex; gap: 8px; align-items: center; }
    .btn {
      padding: 7px 16px; border-radius: var(--radius-sm);
      border: 1px solid var(--border); background: var(--surface2); color: var(--text);
      cursor: pointer; font-size: 0.82rem; transition: all .18s ease;
      display: inline-flex; align-items: center; gap: 5px; font-weight: 500;
      box-shadow: 0 1px 3px rgba(0,0,0,.15);
    }
    .btn:hover { background: var(--surface3); border-color: var(--border2); transform: translateY(-1px); box-shadow: 0 3px 8px rgba(0,0,0,.25); }
    .btn:active { transform: translateY(0); box-shadow: 0 1px 2px rgba(0,0,0,.15); }
    .btn:disabled { opacity: 0.35; cursor: default; }
    .btn-commit { background: var(--positive-dim); border-color: #2d6b45; color: var(--positive); box-shadow: 0 2px 8px rgba(47,124,85,.3); }
    .btn-commit:hover:not(:disabled) { background: #245a38; box-shadow: 0 4px 14px rgba(47,124,85,.35); }
    .btn-sm { padding: 4px 10px; font-size: 0.78rem; }
    select {
      padding: 7px 12px; border-radius: var(--radius-sm);
      border: 1px solid var(--border); background: var(--surface2); color: var(--text);
      font-size: 0.82rem; cursor: pointer;
    }
    .search-input {
      padding: 7px 12px; border-radius: var(--radius-sm);
      border: 1px solid var(--border); background: var(--surface2); color: var(--text);
      font-size: 0.82rem; width: 160px;
    }
    .search-input::placeholder { color: var(--text-dim); }

    /* Table */
    .table-wrap {
      overflow-x: auto; background: var(--surface);
      border: 1px solid var(--border); border-radius: var(--radius);
      box-shadow: var(--shadow-card);
    }
    table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    th {
      text-align: left; padding: 10px 14px; border-bottom: 1px solid var(--border);
      color: var(--text-muted); font-weight: 600; font-size: 0.72rem;
      text-transform: uppercase; letter-spacing: 0.5px; background: var(--surface2);
      white-space: nowrap;
    }
    thead tr { background: linear-gradient(180deg, var(--surface2), var(--surface)); }
    th:first-child { border-radius: var(--radius) 0 0 0; }
    th:last-child { border-radius: 0 var(--radius) 0 0; }
    th.money { text-align: right; }
    td { padding: 10px 14px; border-bottom: 1px solid var(--border); vertical-align: top; }
    tr:last-child td { border-bottom: none; }
    tr:hover { background: var(--surface2); }
    tbody tr { transition: background 0.12s; }
    tr.row-promoted { opacity: 0.5; }
    tr.row-rejected { opacity: 0.35; }
    .merchant-name { font-weight: 500; }
    .merchant-desc {
      font-size: 0.75rem; color: var(--text-dim); margin-top: 2px;
      max-width: 250px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .money { text-align: right; font-variant-numeric: tabular-nums; font-weight: 600; }
    .mono { font-family: monospace; font-size: 0.8rem; color: var(--text-muted); }

    /* Warning badge */
    .warn-badge {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 2px 8px; border-radius: 999px; font-size: 0.7rem; font-weight: 600;
      margin-top: 4px;
    }
    .warn-dup { background: var(--warning-dim); color: var(--warning); }
    .warn-err { background: var(--negative-dim); color: var(--negative); }

    /* Status badge */
    .status-badge {
      display: inline-block; padding: 2px 8px; border-radius: 999px;
      font-size: 0.7rem; font-weight: 600;
    }
    .status-flagged  { background: rgba(251,191,36,.12); color: var(--warning); }
    .status-approved { background: rgba(74,222,128,.12); color: var(--positive); }
    .status-promoted { background: rgba(96,165,250,.12); color: var(--accent-light); }
    .status-rejected { background: rgba(248,113,113,.12); color: var(--negative); }

    /* Inline category select in table */
    .cat-select {
      padding: 3px 6px; border-radius: 4px; font-size: 0.78rem;
      border: 1px solid var(--border); background: var(--surface2); color: var(--text);
    }

    /* Row action buttons */
    .row-actions { display: flex; gap: 5px; flex-wrap: nowrap; }
    .btn-biz {
      background: var(--positive-dim); color: var(--positive); border: none;
      padding: 4px 10px; border-radius: 5px; font-size: 0.78rem; font-weight: 600;
      cursor: pointer; transition: background 0.15s, transform 0.12s;
    }
    .btn-biz:hover { background: #245a38; transform: translateY(-1px); }
    .btn-pers {
      background: var(--negative-dim); color: var(--negative); border: none;
      padding: 4px 10px; border-radius: 5px; font-size: 0.78rem; font-weight: 600;
      cursor: pointer; transition: background 0.15s, transform 0.12s;
    }
    .btn-pers:hover { background: #5a1a2a; transform: translateY(-1px); }
    .btn-reject {
      background: transparent; color: var(--text-dim); border: 1px solid var(--border);
      padding: 4px 10px; border-radius: 5px; font-size: 0.78rem; font-weight: 500;
      cursor: pointer; transition: all 0.15s;
    }
    .btn-reject:hover { color: var(--negative); border-color: var(--negative); transform: translateY(-1px); }
    .btn-biz:disabled, .btn-pers:disabled, .btn-reject:disabled { opacity: 0.3; cursor: default; }

    /* Empty state */
    .empty-state {
      text-align: center; padding: 60px 24px; color: var(--text-dim);
    }
    .empty-state h3 { margin-bottom: 6px; color: var(--text-muted); }

    /* Completion banner */
    .completion-banner {
      background: var(--surface); border: 1px solid #2d6b45;
      border-radius: var(--radius); padding: 36px 24px; text-align: center;
      margin: 24px 0; box-shadow: 0 4px 20px rgba(47,124,85,.15), var(--shadow-card);
    }
    .completion-banner .check-icon {
      width: 52px; height: 52px; background: var(--positive-dim); color: var(--positive);
      border-radius: 50%; display: inline-flex; align-items: center; justify-content: center;
      font-size: 26px; margin-bottom: 14px;
      animation: check-pop 0.4s ease-out;
    }
    @keyframes check-pop {
      0%   { transform: scale(0.5); opacity: 0; }
      70%  { transform: scale(1.12); }
      100% { transform: scale(1); opacity: 1; }
    }
    .completion-banner h2 { font-size: 1.15rem; font-weight: 700; margin-bottom: 6px; }
    .completion-banner .summary {
      color: var(--text-muted); font-size: 0.9rem; margin-bottom: 22px; line-height: 1.7;
    }
    .completion-banner .cta-row { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
    .cta-primary {
      background: var(--accent); color: #fff; border: none; border-radius: var(--radius-sm);
      padding: 10px 24px; font-size: 0.9rem; font-weight: 600;
      cursor: pointer; text-decoration: none; display: inline-block;
      box-shadow: 0 2px 8px rgba(37,99,235,.35);
      transition: background 0.18s, box-shadow 0.18s, transform 0.12s;
    }
    .cta-primary:hover { background: var(--accent-light); color: #000; transform: translateY(-1px); box-shadow: 0 4px 14px rgba(37,99,235,.4); }
    .cta-secondary {
      background: var(--surface2); color: var(--text); border: 1px solid var(--border);
      border-radius: var(--radius-sm); padding: 10px 24px; font-size: 0.9rem; font-weight: 600;
      cursor: pointer; text-decoration: none; display: inline-block;
      transition: all 0.18s;
    }
    .cta-secondary:hover { background: var(--surface3); transform: translateY(-1px); }

    /* Toast */
    #toast {
      position: fixed; bottom: 24px; right: 24px;
      background: var(--surface3); border: 1px solid var(--border2);
      border-radius: var(--radius); padding: 12px 20px; font-size: 0.85rem;
      z-index: 1000; display: none; max-width: 380px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.3);
    }
    #toast.show { display: block; animation: toast-in 0.3s ease-out; }
    @keyframes toast-in {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    #toast.toast-error { border-color: #6b2020; color: var(--negative); }
    #toast.toast-ok { color: var(--positive); }

    .count-label { color: var(--text-muted); font-size: 0.8rem; }

    /* Status badge transitions */
    .status-badge { transition: opacity 0.15s; }

    /* Select / input focus glow */
    select:focus, .search-input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(37,99,235,.15);
    }

    /* Warn badge polish */
    .warn-badge { transition: opacity 0.15s; }

    /* Category select focus */
    .cat-select:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(37,99,235,.12);
    }

    /* Container breathing room on mobile */
    @media (max-width: 640px) {
      .summary-grid { grid-template-columns: repeat(2, 1fr); }
      .action-bar { flex-direction: column; align-items: stretch; }
      .filter-group { flex-wrap: wrap; }
      .search-input { width: 100%; }
    }
  </style>
</head>
<body>

  <header>
    <h1>Expense Import</h1>
  </header>

  <div class="app-content">

    <!-- Upload zone -->
    <div id="upload-section">
      <div class="upload-zone" id="upload-zone">
        <label for="csv-file-input">
          <div class="icon">📄</div>
          <div class="title">Drop a bank or card CSV here, or <span style="color:var(--accent-light)">browse</span></div>
          <div class="hint">Supports Chase, Amex, Bank of America, Wells Fargo, and similar CSV exports.</div>
        </label>
        <input type="file" id="csv-file-input" accept=".csv" />
      </div>
      <div class="upload-progress" id="upload-progress">
        <span class="spinner"></span> Uploading and parsing…
      </div>
    </div>

    <!-- Review section (hidden until upload) -->
    <div id="review-section" style="display:none">

      <!-- Summary cards -->
      <div class="summary-grid" id="summary-grid">
        <div class="summary-card"><div class="label">Total Rows</div><div class="value" id="s-total" style="color:var(--text)">0</div></div>
        <div class="summary-card"><div class="label">Need Review</div><div class="value" id="s-flagged" style="color:var(--warning)">0</div></div>
        <div class="summary-card"><div class="label">Classified</div><div class="value" id="s-approved" style="color:var(--positive)">0</div></div>
        <div class="summary-card"><div class="label">Rejected</div><div class="value" id="s-rejected" style="color:var(--negative)">0</div></div>
        <div class="summary-card"><div class="label">Committed</div><div class="value" id="s-promoted" style="color:var(--accent-light)">0</div></div>
      </div>

      <!-- Action bar -->
      <div class="action-bar">
        <div class="filter-group">
          <select id="filter-status">
            <option value="">All statuses</option>
            <option value="flagged" selected>Need Review</option>
            <option value="approved">Classified</option>
            <option value="rejected">Rejected</option>
            <option value="promoted">Committed</option>
          </select>
          <select id="filter-category">
            <option value="">All categories</option>
          </select>
          <input type="text" class="search-input" id="filter-merchant" placeholder="Search merchant…" />
          <span class="count-label" id="row-count-label"></span>
        </div>
        <div style="display:flex;gap:8px;">
          <button class="btn btn-commit" id="promote-all-btn" disabled>Commit All Classified</button>
          <button class="btn" id="new-import-btn">New Import</button>
        </div>
      </div>

      <!-- Table -->
      <div class="table-wrap" id="table-wrap">
        <table data-cy="expense-review-table">
          <thead>
            <tr>
              <th>Date</th>
              <th>Merchant</th>
              <th class="money">Amount</th>
              <th>Category</th>
              <th>Status</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="review-tbody"></tbody>
        </table>
      </div>
      <div id="review-empty" class="empty-state" style="display:none">
        <h3>No rows match filters</h3>
        <p>Try changing the status or category filter above.</p>
      </div>
    </div>

    <!-- Completion banner -->
    <div id="completion-banner" class="completion-banner" style="display:none">
      <div class="check-icon">✓</div>
      <h2>Import Complete</h2>
      <p class="summary" id="completion-summary"></p>
      <div class="cta-row">
        <a class="cta-primary" href="/dashboard/">View in Dashboard</a>
        <button class="cta-secondary" id="completion-new-import">Import Another File</button>
      </div>
    </div>

  </div>

  <div id="toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/app-shell.js"></script>
  <script src="../js/csv-mapping-wizard.js"></script>
  <script type="module" src="js/expense-review.js"></script>
</body>
</html>
