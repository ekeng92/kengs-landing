<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#0f1117" />
  <link rel="icon" type="image/svg+xml" href="../favicon.svg" />
  <link rel="manifest" href="../manifest.json" />
  <title>Cleaning — Keng's Landing</title>
  <link rel="stylesheet" href="../css/app-shell.css" />
  <style>
    main { max-width:1100px; margin:0 auto; padding:16px 16px 80px; }
    .page-title { font-size:1.3rem; font-weight:700; margin-bottom:4px; }
    .page-sub { color:var(--text-muted); font-size:.85rem; margin-bottom:16px; }

    /* Tabs */
    nav.tabs { display:flex; gap:0; background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; margin-bottom:18px; box-shadow:0 2px 8px rgba(0,0,0,.18); }
    nav.tabs button { flex:1; background:none; border:none; color:var(--text-muted); padding:11px 14px; font-size:.82rem; cursor:pointer; border-bottom:2px solid transparent; transition:color .25s ease, background .25s ease, border-color .3s ease, box-shadow .25s ease; white-space:nowrap; min-height:44px; position:relative; }
    nav.tabs button::after { content:''; position:absolute; bottom:0; left:50%; width:0; height:2px; background:var(--accent-light); transition:width .3s ease, left .3s ease; border-radius:1px; }
    nav.tabs button:hover { color:var(--text); background:var(--surface2); }
    nav.tabs button:hover::after { width:40%; left:30%; }
    nav.tabs button.active { color:var(--accent-light); border-bottom-color:transparent; background:rgba(74,222,128,.04); }
    nav.tabs button.active::after { width:100%; left:0; }

    .tab-content { display:none; }
    .tab-content.active { display:block; animation:panelFadeIn .25s ease; }

    /* Panels */
    .panel { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:20px; margin-bottom:16px; box-shadow:0 2px 10px rgba(0,0,0,.2); transition:box-shadow .2s ease; }
    .panel:hover { box-shadow:0 4px 16px rgba(0,0,0,.28); }
    .panel-title { font-size:.95rem; font-weight:600; margin:0 0 14px; padding-bottom:10px; border-bottom:1px solid var(--border); border-left:3px solid var(--accent); padding-left:10px; }
    .muted { color:var(--text-muted); font-size:.85rem; }

    /* Forms */
    .form-grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(180px,1fr)); gap:12px; align-items:end; }
    .form-group { display:flex; flex-direction:column; gap:5px; }
    .form-group label { font-size:.72rem; color:var(--text-muted); text-transform:uppercase; letter-spacing:.4px; }
    input, select { width:100%; background:var(--surface2); color:var(--text); border:1px solid var(--border); border-radius:var(--radius-sm); padding:9px 12px; font-size:.85rem; transition:border-color .2s ease, box-shadow .2s ease; }
    input:focus, select:focus { outline:none; border-color:var(--accent); box-shadow:0 0 0 2px rgba(47,124,85,.25); }
    input::placeholder { color:var(--text-dim); }

    /* Buttons */
    .btn { padding:9px 16px; border-radius:var(--radius-sm); border:1px solid var(--accent); background:var(--accent-dim); color:var(--accent-light); cursor:pointer; font-size:.82rem; font-weight:600; transition:all .2s ease; white-space:nowrap; }
    .btn:hover { background:var(--accent); color:#fff; transform:translateY(-1px); box-shadow:0 3px 10px rgba(47,124,85,.3), 0 0 16px rgba(74,222,128,.15); }
    .btn:active { transform:translateY(0); }
    .btn:disabled { opacity:.5; cursor:not-allowed; transform:none; box-shadow:none; }
    .btn-danger { background:transparent; color:var(--negative); border-color:#7f1d1d; }
    .btn-danger:hover { background:rgba(248,113,113,.15); transform:translateY(-1px); box-shadow:0 3px 10px rgba(127,29,29,.25); }
    .btn-secondary { background:transparent; color:var(--text-muted); border-color:var(--border); }
    .btn-secondary:hover { color:var(--text); background:var(--surface2); }
    .btn-sm { padding:5px 10px; font-size:.75rem; }

    /* Badges */
    .badge { display:inline-block; padding:3px 10px; border-radius:999px; font-size:.7rem; font-weight:600; letter-spacing:.3px; }
    .badge-active { background:rgba(74,222,128,.15); color:var(--positive); }
    .badge-inactive { background:rgba(248,113,113,.15); color:var(--negative); }
    .badge-expired { background:rgba(90,95,114,.2); color:var(--text-dim); }
    .badge-submitted { background:rgba(74,222,128,.15); color:var(--positive); }
    .badge-in-progress { background:rgba(251,191,36,.15); color:var(--warning); }
    .badge-abandoned { background:rgba(90,95,114,.2); color:var(--text-dim); }

    /* Link rows */
    .link-row { border-top:1px solid var(--border); padding:14px 0; display:grid; grid-template-columns:1.3fr .7fr .5fr auto; gap:10px; align-items:center; transition:background .15s ease; }
    .link-row:hover { background:rgba(255,255,255,.02); }
    .link-row:first-child { border-top:0; }
    .link-name { font-weight:600; font-size:.9rem; }
    .link-meta { color:var(--text-muted); font-size:.78rem; }
    .link-url { font-size:.72rem; color:var(--text-dim); word-break:break-all; cursor:pointer; transition:color .15s ease; }
    .link-url:hover { color:var(--accent-light); }

    /* Session rows */
    .session-row { border-top:1px solid var(--border); padding:14px 0; cursor:pointer; transition:background .15s ease; border-radius:var(--radius-sm); }
    .session-row:hover { background:var(--surface2); }
    .session-row:first-child { border-top:0; }
    .session-header { display:grid; grid-template-columns:1fr auto auto; gap:10px; align-items:center; }
    .session-detail { display:none; margin-top:12px; padding:14px; background:var(--surface2); border-radius:var(--radius-sm); font-size:.82rem; border:1px solid var(--border); border-left:3px solid var(--accent); }
    .session-detail.open { display:block; animation:panelFadeIn .2s ease; }
    .detail-grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(140px,1fr)); gap:10px; }
    .detail-label { font-size:.7rem; color:var(--text-dim); text-transform:uppercase; letter-spacing:.3px; margin-bottom:2px; }
    .detail-value { color:var(--text); }
    .checklist-summary { margin-top:10px; }
    .checklist-item { display:flex; gap:8px; align-items:center; padding:4px 0; font-size:.82rem; }
    .checklist-item .icon-check { color:var(--positive); }
    .checklist-item .icon-skip { color:var(--text-dim); text-decoration:line-through; opacity:.7; }
    .section-divider { font-size:.72rem; color:var(--text-dim); text-transform:uppercase; letter-spacing:.4px; margin:12px 0 6px; font-weight:600; }

    /* Empty state */
    .empty { text-align:center; padding:48px 20px; color:var(--text-muted); }
    .empty .icon { font-size:40px; margin-bottom:10px; opacity:.6; animation:emptyFloat 3s ease-in-out infinite; }
    .empty p { font-size:.88rem; }
    @keyframes emptyFloat { 0%,100% { transform:translateY(0); } 50% { transform:translateY(-6px); } }

    /* Toast */
    .toast { position:fixed; bottom:80px; left:50%; transform:translateX(-50%); background:var(--surface2); color:var(--text); border:1px solid var(--border); padding:10px 20px; border-radius:var(--radius); font-size:.85rem; z-index:500; display:none; box-shadow:0 4px 16px rgba(0,0,0,.3); }
    .toast.show { display:block; animation:toastSlideIn .25s ease; }
    @keyframes toastSlideIn { from { opacity:0; transform:translateX(-50%) translateY(10px); } to { opacity:1; transform:translateX(-50%) translateY(0); } }
    @keyframes panelFadeIn { from { opacity:0; transform:translateY(4px); } to { opacity:1; transform:translateY(0); } }

    /* Responsive */
    @media (max-width:600px) {
      .link-row { grid-template-columns:1fr; gap:6px; }
      .session-header { grid-template-columns:1fr auto; }
      .detail-grid { grid-template-columns:1fr 1fr; }
    }

    /* List cards */
    .list-card { border-top:1px solid var(--border); padding:14px 0; display:flex; justify-content:space-between; align-items:center; cursor:pointer; transition:background .15s ease, padding-left .15s ease; }
    .list-card:hover { background:var(--surface2); padding-left:6px; }
    .list-card:first-child { border-top:0; }
    .list-card-name { font-weight:600; font-size:.9rem; }
    .list-card-meta { color:var(--text-muted); font-size:.78rem; }

    /* List item editor rows */
    .list-item-row { display:grid; grid-template-columns:2fr 1fr .7fr auto; gap:8px; align-items:center; padding:8px 0; border-top:1px solid var(--border); font-size:.82rem; }
    .list-item-row:first-child { border-top:0; }
    .list-item-label { font-weight:500; }
    .list-item-section { color:var(--text-muted); font-size:.75rem; }
    .list-item-freq { color:var(--text-dim); font-size:.75rem; }
    @media (max-width:600px) {
      .list-item-row { grid-template-columns:1fr auto; }
      .list-item-section, .list-item-freq { display:none; }
    }
  </style>
</head>
<body>
  <header><h1>Cleaning</h1></header>
  <main>
    <h1 class="page-title">Cleaning Management</h1>
    <p class="page-sub">Manage cleaning links, view history, and track submissions.</p>

    <nav class="tabs" id="tabs">
      <button class="active" data-tab="links">Links</button>
      <button data-tab="history">History</button>
      <button data-tab="lists">Lists</button>
    </nav>

    <!-- ─── Links Tab ─── -->
    <div class="tab-content active" id="tab-links">
      <div class="panel">
        <div class="panel-title">Create New Link</div>
        <div class="form-grid">
          <div class="form-group">
            <label>Cleaner Name</label>
            <input id="new-cleaner-name" placeholder="e.g. Julie" />
          </div>
          <div class="form-group">
            <label>Contact (optional)</label>
            <input id="new-cleaner-contact" placeholder="Phone or email" />
          </div>
          <div class="form-group">
            <label>Property</label>
            <select id="new-property">
              <option value="">All Properties</option>
            </select>
          </div>
          <div class="form-group">
            <label>Cleaning Type</label>
            <select id="new-cleaning-type">
              <option value="all">All (Turnover + Weekly + Monthly)</option>
              <option value="turnover">Turnover Only</option>
              <option value="weekly">Weekly Only</option>
              <option value="monthly">Monthly Only</option>
            </select>
          </div>
          <div class="form-group">
            <label>Expires</label>
            <select id="new-expires">
              <option value="">Never</option>
              <option value="7">7 days</option>
              <option value="30">30 days</option>
              <option value="90">90 days</option>
              <option value="365">1 year</option>
            </select>
          </div>
          <div class="form-group">
            <label>Checklist</label>
            <select id="new-list">
              <option value="">No checklist</option>
            </select>
          </div>
          <div class="form-group">
            <label>&nbsp;</label>
            <button class="btn" id="btn-create-link">Create Link</button>
          </div>
        </div>
      </div>

      <div class="panel">
        <div class="panel-title">Active Links</div>
        <div id="links-list">
          <div class="empty"><div class="icon">🔗</div><p>Loading links...</p></div>
        </div>
      </div>
    </div>

    <!-- ─── History Tab ─── -->
    <div class="tab-content" id="tab-history">
      <div class="panel">
        <div class="panel-title">Cleaning Sessions</div>
        <div style="margin-bottom:12px;">
          <select id="filter-link" style="max-width:300px;">
            <option value="">All Links</option>
          </select>
        </div>
        <div id="sessions-list">
          <div class="empty"><div class="icon">📋</div><p>Loading sessions...</p></div>
        </div>
      </div>
    </div>

    <!-- ─── Lists Tab ─── -->
    <div class="tab-content" id="tab-lists">
      <div class="panel">
        <div class="panel-title">Cleaning Lists</div>
        <div id="lists-list">
          <div class="empty"><div class="icon">📝</div><p>Loading lists...</p></div>
        </div>
        <div style="margin-top:12px;">
          <button class="btn" id="btn-create-list">+ New List</button>
        </div>
      </div>

      <!-- List editor (shown when editing a list) -->
      <div class="panel" id="list-editor" style="display:none;">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
          <div class="panel-title" style="margin:0;" id="editor-title">Edit List</div>
          <button class="btn btn-secondary btn-sm" onclick="closeEditor()">✕ Close</button>
        </div>
        <div class="form-grid" style="margin-bottom:16px;">
          <div class="form-group">
            <label>List Name</label>
            <input id="edit-list-name" placeholder="e.g. 360 CR Turnover Checklist" />
          </div>
          <div class="form-group">
            <label>Description</label>
            <input id="edit-list-desc" placeholder="Optional description" />
          </div>
          <div class="form-group">
            <label>&nbsp;</label>
            <button class="btn btn-sm" id="btn-save-list">Save</button>
          </div>
        </div>

        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;">
          <div style="font-weight:600; font-size:.85rem;">Items</div>
          <button class="btn btn-sm" id="btn-add-item">+ Add Item</button>
        </div>
        <div id="list-items-editor">
          <div class="empty"><div class="icon">📝</div><p>No items yet</p></div>
        </div>
      </div>
    </div>
  </main>

  <div class="toast" id="toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/app-shell.js"></script>
  <script>
    (async function () {
      'use strict';

      const session = await Auth.requireLogin();
      const API = Auth.API;
      const workspaceId = await Auth.getWorkspaceId();

      // ── Tabs ──
      document.querySelectorAll('#tabs button').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('#tabs button').forEach(b => b.classList.remove('active'));
          document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
          btn.classList.add('active');
          document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
          if (btn.dataset.tab === 'history') loadSessions();
          if (btn.dataset.tab === 'lists') loadLists();
        });
      });

      // ── Data ──
      let links = [];
      let properties = [];

      async function headers() { return Auth.jsonHeaders(); }

      function toast(msg) {
        const el = document.getElementById('toast');
        el.textContent = msg;
        el.classList.add('show');
        setTimeout(() => el.classList.remove('show'), 3000);
      }

      function escapeHtml(str) {
        const div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
      }

      function formatDate(iso) {
        if (!iso) return '—';
        const d = new Date(iso);
        return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric', hour: 'numeric', minute: '2-digit' });
      }

      function getPublicUrl(token) {
        const base = location.hostname === 'localhost'
          ? location.origin
          : 'https://kengs-landing.pages.dev';
        return base + '/clean/?t=' + encodeURIComponent(token);
      }

      function linkStatus(link) {
        if (!link.is_active) return { label: 'Inactive', cls: 'badge-inactive' };
        if (link.expires_at && new Date(link.expires_at) < new Date()) return { label: 'Expired', cls: 'badge-expired' };
        return { label: 'Active', cls: 'badge-active' };
      }

      // ── Load properties for dropdown ──
      async function loadProperties() {
        try {
          const resp = await fetch(API + '/properties?workspace_id=' + workspaceId, { headers: await headers() });
          const json = await resp.json();
          properties = json.data || json || [];
          const sel = document.getElementById('new-property');
          properties.forEach(p => {
            const opt = document.createElement('option');
            opt.value = p.id;
            opt.textContent = p.name;
            sel.appendChild(opt);
          });
        } catch (e) { /* ignore */ }
      }

      // ── Load links ──
      async function loadLinks() {
        try {
          const resp = await fetch(API + '/cleaning/links?workspace_id=' + workspaceId, { headers: await headers() });
          const json = await resp.json();
          links = json.data || [];
          renderLinks();
          // Populate filter dropdown
          const filterSel = document.getElementById('filter-link');
          filterSel.innerHTML = '<option value="">All Links</option>';
          links.forEach(l => {
            const opt = document.createElement('option');
            opt.value = l.id;
            opt.textContent = escapeHtml(l.cleaner_name) + (l.is_active ? '' : ' (inactive)');
            filterSel.appendChild(opt);
          });
        } catch (e) {
          document.getElementById('links-list').innerHTML = '<div class="empty"><div class="icon">⚠️</div><p>Failed to load links</p></div>';
        }
      }

      function renderLinks() {
        const container = document.getElementById('links-list');
        if (!links.length) {
          container.innerHTML = '<div class="empty"><div class="icon">🔗</div><p>No cleaning links yet. Create one above.</p></div>';
          return;
        }
        container.innerHTML = links.map(l => {
          const st = linkStatus(l);
          const url = getPublicUrl(l.token);
          const propName = properties.find(p => p.id === l.property_id)?.name || 'All';
          return `
            <div class="link-row">
              <div>
                <div class="link-name">${escapeHtml(l.cleaner_name)}</div>
                <div class="link-meta">${escapeHtml(propName)} · ${l.cleaning_type || 'all'}</div>
                <div class="link-url" data-url="${escapeHtml(url)}" title="Click to copy">${escapeHtml(url)}</div>
              </div>
              <div>
                <span class="badge ${st.cls}">${st.label}</span>
                ${l.cleaner_contact ? '<div class="link-meta" style="margin-top:4px">' + escapeHtml(l.cleaner_contact) + '</div>' : ''}
              </div>
              <div class="link-meta">${formatDate(l.created_at)}</div>
              <div>
                <button class="btn btn-sm btn-secondary" onclick="copyUrl(this)" data-url="${escapeHtml(url)}">Copy</button>
                ${l.is_active
                  ? `<button class="btn btn-sm btn-danger" onclick="toggleLink('${l.id}', false)" style="margin-left:6px">Deactivate</button>`
                  : `<button class="btn btn-sm" onclick="toggleLink('${l.id}', true)" style="margin-left:6px">Activate</button>`
                }
              </div>
            </div>
          `;
        }).join('');

        // Click URL to copy
        container.querySelectorAll('.link-url').forEach(el => {
          el.addEventListener('click', () => {
            navigator.clipboard.writeText(el.dataset.url).then(() => toast('Link copied!'));
          });
        });
      }

      // ── Create link ──
      document.getElementById('btn-create-link').addEventListener('click', async () => {
        const name = document.getElementById('new-cleaner-name').value.trim();
        if (!name) { toast('Cleaner name is required'); return; }

        const body = {
          workspace_id: workspaceId,
          cleaner_name: name,
          cleaner_contact: document.getElementById('new-cleaner-contact').value.trim() || undefined,
          property_id: document.getElementById('new-property').value || undefined,
          cleaning_type: document.getElementById('new-cleaning-type').value,
          list_id: document.getElementById('new-list').value || undefined,
        };

        const expDays = document.getElementById('new-expires').value;
        if (expDays) {
          const d = new Date();
          d.setDate(d.getDate() + parseInt(expDays));
          body.expires_at = d.toISOString();
        }

        try {
          const resp = await fetch(API + '/cleaning/links', {
            method: 'POST',
            headers: await headers(),
            body: JSON.stringify(body),
          });
          if (!resp.ok) {
            const err = await resp.json();
            toast(err.error || 'Failed to create link');
            return;
          }
          document.getElementById('new-cleaner-name').value = '';
          document.getElementById('new-cleaner-contact').value = '';
          toast('Link created!');
          loadLinks();
        } catch (e) {
          toast('Network error');
        }
      });

      // ── Toggle link active/inactive ──
      window.toggleLink = async function (id, active) {
        try {
          await fetch(API + '/cleaning/links/' + id, {
            method: 'PATCH',
            headers: await headers(),
            body: JSON.stringify({ is_active: active }),
          });
          loadLinks();
          toast(active ? 'Link activated' : 'Link deactivated');
        } catch (e) {
          toast('Failed to update link');
        }
      };

      // ── Copy URL ──
      window.copyUrl = function (btn) {
        navigator.clipboard.writeText(btn.dataset.url).then(() => toast('Link copied!'));
      };

      // ── Load sessions ──
      async function loadSessions() {
        const linkId = document.getElementById('filter-link').value;
        let url = API + '/cleaning/sessions?workspace_id=' + workspaceId;
        if (linkId) url += '&link_id=' + linkId;

        try {
          const resp = await fetch(url, { headers: await headers() });
          const json = await resp.json();
          const sessions = json.data || [];
          renderSessions(sessions);
        } catch (e) {
          document.getElementById('sessions-list').innerHTML = '<div class="empty"><div class="icon">⚠️</div><p>Failed to load sessions</p></div>';
        }
      }

      function renderSessions(sessions) {
        const container = document.getElementById('sessions-list');
        if (!sessions.length) {
          container.innerHTML = '<div class="empty"><div class="icon">📋</div><p>No cleaning sessions yet.</p></div>';
          return;
        }
        container.innerHTML = sessions.map(s => {
          const link = links.find(l => l.id === s.link_id);
          const cleanerName = link ? link.cleaner_name : 'Unknown';
          const statusCls = s.status === 'submitted' ? 'badge-submitted' : s.status === 'in_progress' ? 'badge-in-progress' : 'badge-abandoned';
          return `
            <div class="session-row" data-id="${s.id}">
              <div class="session-header">
                <div>
                  <div style="font-weight:600; font-size:.9rem;">${escapeHtml(cleanerName)}</div>
                  <div class="link-meta">${formatDate(s.opened_at)}${s.city ? ' · ' + escapeHtml(s.city) + (s.country ? ', ' + escapeHtml(s.country) : '') : ''}</div>
                </div>
                <span class="badge ${statusCls}">${s.status}</span>
                <span class="link-meta" style="font-size:.7rem;">▸ details</span>
              </div>
              <div class="session-detail" id="detail-${s.id}"></div>
            </div>
          `;
        }).join('');

        container.querySelectorAll('.session-row').forEach(row => {
          row.addEventListener('click', () => toggleDetail(row.dataset.id));
        });
      }

      async function toggleDetail(id) {
        const el = document.getElementById('detail-' + id);
        if (el.classList.contains('open')) {
          el.classList.remove('open');
          return;
        }

        el.innerHTML = '<span class="muted">Loading...</span>';
        el.classList.add('open');

        try {
          const resp = await fetch(API + '/cleaning/sessions/' + id, { headers: await headers() });
          const data = await resp.json();
          renderDetail(el, data);
        } catch (e) {
          el.innerHTML = '<span class="muted">Failed to load details</span>';
        }
      }

      function renderDetail(el, data) {
        const metaHtml = `
          <div class="detail-grid">
            <div><div class="detail-label">IP Address</div><div class="detail-value">${escapeHtml(data.ip_address || '—')}</div></div>
            <div><div class="detail-label">City</div><div class="detail-value">${escapeHtml(data.city || '—')}</div></div>
            <div><div class="detail-label">Country</div><div class="detail-value">${escapeHtml(data.country || '—')}</div></div>
            <div><div class="detail-label">Timezone</div><div class="detail-value">${escapeHtml(data.timezone || '—')}</div></div>
            <div><div class="detail-label">User Agent</div><div class="detail-value" style="font-size:.72rem; word-break:break-all;">${escapeHtml(data.user_agent || '—')}</div></div>
            <div><div class="detail-label">Screen Size</div><div class="detail-value">${escapeHtml(data.screen_size || '—')}</div></div>
            <div><div class="detail-label">Language</div><div class="detail-value">${escapeHtml(data.language || '—')}</div></div>
            <div><div class="detail-label">Connection</div><div class="detail-value">${escapeHtml(data.connection_type || '—')}</div></div>
            ${data.latitude ? `<div><div class="detail-label">GPS</div><div class="detail-value">${data.latitude}, ${data.longitude} (±${data.geo_accuracy || '?'}m)</div></div>` : ''}
            <div><div class="detail-label">Opened</div><div class="detail-value">${formatDate(data.opened_at)}</div></div>
            <div><div class="detail-label">Submitted</div><div class="detail-value">${formatDate(data.submitted_at)}</div></div>
            ${data.cleaned_date ? `<div><div class="detail-label">Cleaned Date</div><div class="detail-value">${escapeHtml(data.cleaned_date)}</div></div>` : ''}
            ${data.completed_by ? `<div><div class="detail-label">Done By</div><div class="detail-value">${escapeHtml(data.completed_by)}</div></div>` : ''}
            ${data.notes ? `<div style="grid-column:1/-1"><div class="detail-label">Notes</div><div class="detail-value">${escapeHtml(data.notes)}</div></div>` : ''}
          </div>
        `;

        let itemsHtml = '';
        if (data.items && data.items.length > 0) {
          let currentSection = '';
          const sorted = [...data.items].sort((a, b) => (a.section || '').localeCompare(b.section || '') || a.item_key.localeCompare(b.item_key));
          sorted.forEach(item => {
            if (item.section !== currentSection) {
              currentSection = item.section;
              itemsHtml += `<div class="section-divider">${escapeHtml(currentSection || 'General')}</div>`;
            }
            const icon = item.checked ? '<span class="icon-check">✓</span>' : '<span class="icon-skip">—</span>';
            const style = item.checked ? '' : 'opacity:.5';
            itemsHtml += `<div class="checklist-item" style="${style}">${icon} ${escapeHtml(item.item_label)}</div>`;
          });

          const checked = data.items.filter(i => i.checked).length;
          const total = data.items.length;
          itemsHtml = `
            <div class="checklist-summary">
              <div class="detail-label" style="margin-bottom:6px">Checklist (${checked}/${total})</div>
              ${itemsHtml}
            </div>
          `;
        }

        el.innerHTML = metaHtml + itemsHtml;
      }

      // Filter
      document.getElementById('filter-link').addEventListener('change', loadSessions);

      // ── Lists ──
      let cleaningLists = [];
      let editingListId = null;

      async function loadLists() {
        try {
          const resp = await fetch(API + '/cleaning-lists?workspace_id=' + workspaceId, { headers: await headers() });
          const json = await resp.json();
          cleaningLists = json.data || [];
          renderLists();
          // Also populate list dropdown in link creation if it exists
          populateListDropdown();
        } catch (e) {
          document.getElementById('lists-list').innerHTML = '<div class="empty"><div class="icon">⚠️</div><p>Failed to load lists</p></div>';
        }
      }

      function renderLists() {
        const container = document.getElementById('lists-list');
        if (!cleaningLists.length) {
          container.innerHTML = '<div class="empty"><div class="icon">📝</div><p>No cleaning lists yet. Create one to get started.</p></div>';
          return;
        }
        container.innerHTML = cleaningLists.map(l => {
          const itemCount = l.cleaning_list_items?.[0]?.count ?? '?';
          return `
            <div class="list-card" onclick="openListEditor('${l.id}')">
              <div>
                <div class="list-card-name">${escapeHtml(l.name)}</div>
                <div class="list-card-meta">${itemCount} items · ${l.is_template ? 'Template' : 'Active'} · Created ${formatDate(l.created_at)}</div>
              </div>
              <div style="display:flex; gap:6px;">
                <button class="btn btn-sm btn-secondary" onclick="event.stopPropagation(); copyList('${l.id}')">Copy</button>
                <button class="btn btn-sm btn-danger" onclick="event.stopPropagation(); deleteList('${l.id}', '${escapeHtml(l.name)}')">Delete</button>
              </div>
            </div>
          `;
        }).join('');
      }

      function populateListDropdown() {
        // Add list dropdown to link creation form if not already there
        let sel = document.getElementById('new-list');
        if (!sel) return;
        sel.innerHTML = '<option value="">No checklist</option>';
        cleaningLists.forEach(l => {
          const opt = document.createElement('option');
          opt.value = l.id;
          opt.textContent = l.name;
          sel.appendChild(opt);
        });
      }

      window.openListEditor = async function(id) {
        editingListId = id;
        document.getElementById('list-editor').style.display = 'block';
        document.getElementById('editor-title').textContent = 'Loading...';

        try {
          const resp = await fetch(API + '/cleaning-lists/' + id, { headers: await headers() });
          const list = await resp.json();

          document.getElementById('editor-title').textContent = 'Edit: ' + list.name;
          document.getElementById('edit-list-name').value = list.name || '';
          document.getElementById('edit-list-desc').value = list.description || '';

          renderListItems(list.items || []);
        } catch (e) {
          document.getElementById('editor-title').textContent = 'Error loading list';
        }
      };

      function renderListItems(items) {
        const container = document.getElementById('list-items-editor');
        if (!items.length) {
          container.innerHTML = '<div class="empty"><div class="icon">📝</div><p>No items yet. Add one above.</p></div>';
          return;
        }

        // Group by section
        let currentSection = '';
        let html = '';
        items.forEach(item => {
          if (item.section !== currentSection) {
            currentSection = item.section;
            html += `<div class="section-divider">${escapeHtml(currentSection)}</div>`;
          }
          const freq = item.frequency_days ? `Every ${item.frequency_days}d` : 'Required';
          const group = item.group_name ? escapeHtml(item.group_name) : '';
          html += `
            <div class="list-item-row">
              <div class="list-item-label">${escapeHtml(item.item_label)}${item.item_hint ? ' <span style="color:var(--text-dim);font-size:.72rem">(' + escapeHtml(item.item_hint) + ')</span>' : ''}</div>
              <div class="list-item-section">${group}</div>
              <div class="list-item-freq">${freq}</div>
              <button class="btn btn-sm btn-danger" onclick="deleteItem('${item.id}')">✕</button>
            </div>
          `;
        });
        container.innerHTML = html;
      }

      window.closeEditor = function() {
        document.getElementById('list-editor').style.display = 'none';
        editingListId = null;
      };

      // Save list metadata
      document.getElementById('btn-save-list').addEventListener('click', async () => {
        if (!editingListId) return;
        const name = document.getElementById('edit-list-name').value.trim();
        if (!name) { toast('Name is required'); return; }

        try {
          await fetch(API + '/cleaning-lists/' + editingListId, {
            method: 'PATCH',
            headers: await headers(),
            body: JSON.stringify({
              name,
              description: document.getElementById('edit-list-desc').value.trim() || undefined,
            }),
          });
          toast('List saved');
          loadLists();
          document.getElementById('editor-title').textContent = 'Edit: ' + name;
        } catch (e) {
          toast('Failed to save');
        }
      });

      // Add item
      document.getElementById('btn-add-item').addEventListener('click', async () => {
        if (!editingListId) return;
        const label = prompt('Item label:');
        if (!label) return;
        const section = prompt('Section (turnover, weekly, or monthly):', 'turnover');
        if (!section) return;
        const key = section + '.' + label.toLowerCase().replace(/[^a-z0-9]+/g, '_').slice(0, 40);

        try {
          await fetch(API + '/cleaning-lists/' + editingListId + '/items', {
            method: 'POST',
            headers: await headers(),
            body: JSON.stringify({ item_key: key, item_label: label, section }),
          });
          toast('Item added');
          openListEditor(editingListId);
        } catch (e) {
          toast('Failed to add item');
        }
      });

      // Delete item
      window.deleteItem = async function(itemId) {
        if (!editingListId) return;
        if (!confirm('Delete this item?')) return;
        try {
          await fetch(API + '/cleaning-lists/' + editingListId + '/items/' + itemId, {
            method: 'DELETE',
            headers: await headers(),
          });
          toast('Item deleted');
          openListEditor(editingListId);
        } catch (e) {
          toast('Failed to delete item');
        }
      };

      // Create new list
      document.getElementById('btn-create-list').addEventListener('click', async () => {
        const name = prompt('New list name:');
        if (!name) return;
        try {
          const resp = await fetch(API + '/cleaning-lists', {
            method: 'POST',
            headers: await headers(),
            body: JSON.stringify({ workspace_id: workspaceId, name }),
          });
          if (!resp.ok) { toast('Failed to create list'); return; }
          toast('List created');
          loadLists();
          const list = await resp.json();
          openListEditor(list.id);
        } catch (e) {
          toast('Failed to create list');
        }
      });

      // Copy list
      window.copyList = async function(id) {
        try {
          await fetch(API + '/cleaning-lists/' + id + '/copy', {
            method: 'POST',
            headers: await headers(),
            body: JSON.stringify({}),
          });
          toast('List copied');
          loadLists();
        } catch (e) {
          toast('Failed to copy list');
        }
      };

      // Delete list
      window.deleteList = async function(id, name) {
        if (!confirm('Delete list "' + name + '"? This cannot be undone.')) return;
        try {
          await fetch(API + '/cleaning-lists/' + id, {
            method: 'DELETE',
            headers: await headers(),
          });
          toast('List deleted');
          if (editingListId === id) closeEditor();
          loadLists();
        } catch (e) {
          toast('Failed to delete list');
        }
      };

      // ── Init ──
      await loadProperties();
      await loadLinks();
      await loadLists();
    })();
  </script>
</body>
</html>
