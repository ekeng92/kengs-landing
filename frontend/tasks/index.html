<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#0f1117" />
  <link rel="icon" type="image/svg+xml" href="../favicon.svg" />
  <link rel="manifest" href="../manifest.json" />
  <title>Tasks — Keng's Landing</title>
  <link rel="stylesheet" href="../css/app-shell.css" />
  <style>
    :root {
      --bg: #0f1117; --surface: #1a1d27; --surface2: #222633; --surface3: #2a2e3b;
      --border: #2e3345; --border2: #3d4255;
      --text: #e2e4ea; --text-muted: #8b90a0; --text-dim: #5a5f72;
      --accent: #2f7c55; --accent-light: #4ade80; --accent-dim: #1e4a35;
      --blue: #2563eb; --blue-light: #60a5fa;
      --purple: #7c3aed; --purple-light: #a78bfa;
      --orange: #d97706; --orange-light: #fbbf24;
      --red: #dc2626; --red-light: #f87171;
      --cyan: #06b6d4; --cyan-light: #67e8f9;
      --radius: 12px; --radius-sm: 8px;
      --shadow-card: 0 1px 3px rgba(0,0,0,.25), 0 1px 2px rgba(0,0,0,.15);
      --shadow-column: 0 2px 8px rgba(0,0,0,.2);
      --shadow-modal: 0 8px 32px rgba(0,0,0,.5), 0 2px 8px rgba(0,0,0,.3);
    }

    /* Toolbar */
    .toolbar {
      max-width: 1600px; margin: 0 auto; padding: 20px 24px 0;
      display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
    }
    .toolbar h1 { font-size: 1.2rem; font-weight: 700; margin-right: auto; }
    .filter-group { display: flex; align-items: center; gap: 6px; }
    .filter-group label {
      font-size: 0.7rem; color: var(--text-dim); text-transform: uppercase;
      letter-spacing: 0.6px; font-weight: 600;
    }
    select, .search-input {
      background: var(--surface2); border: 1px solid var(--border); color: var(--text);
      padding: 7px 10px; border-radius: var(--radius-sm); font-size: 0.82rem;
      transition: border-color .2s, box-shadow .2s, background .2s;
    }
    select:hover, .search-input:hover {
      border-color: var(--border2); background: var(--surface3);
    }
    select:focus, .search-input:focus {
      outline: none; border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(47,124,85,.18);
    }
    .search-input { width: 180px; }
    .search-input::placeholder { color: var(--text-dim); }
    .btn-add {
      padding: 8px 18px; border-radius: var(--radius-sm);
      border: none; background: var(--accent);
      color: #fff; cursor: pointer; font-size: 0.82rem;
      font-weight: 600; transition: all .2s;
      box-shadow: 0 2px 8px rgba(47,124,85,.3);
    }
    .btn-add:hover {
      background: var(--accent-light); color: var(--bg);
      transform: translateY(-1px);
      box-shadow: 0 4px 14px rgba(47,124,85,.35);
    }
    .btn-add:active {
      transform: translateY(0);
      box-shadow: 0 1px 4px rgba(47,124,85,.2);
    }

    /* Kanban board */
    .board {
      max-width: 1600px; margin: 0 auto; padding: 20px 24px 32px;
      display: grid; grid-template-columns: repeat(6, 1fr); gap: 14px;
      min-height: calc(100vh - 180px);
    }
    .column {
      background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
      display: flex; flex-direction: column; min-height: 300px;
      box-shadow: var(--shadow-column);
      transition: box-shadow .25s, border-color .25s;
    }
    .column:hover {
      border-color: var(--border2);
      box-shadow: 0 4px 16px rgba(0,0,0,.28);
    }
    .column-header {
      padding: 14px 14px 10px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      position: relative; background: rgba(255,255,255,.015);
      border-radius: var(--radius) var(--radius) 0 0;
    }
    /* Color accent stripe at top of each column */
    .column-header::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0;
      height: 3px; border-radius: var(--radius) var(--radius) 0 0;
    }
    .column[data-status="backlog"]     .column-header::before { background: var(--text-dim); }
    .column[data-status="todo"]        .column-header::before { background: var(--blue-light); }
    .column[data-status="in_progress"] .column-header::before { background: var(--accent-light); }
    .column[data-status="review"]      .column-header::before { background: var(--purple-light); }
    .column[data-status="waiting"]     .column-header::before { background: var(--orange-light); }
    .column[data-status="done"]        .column-header::before { background: var(--cyan-light); }

    /* Subtle gradient tint on column headers matching accent */
    .column[data-status="backlog"]     .column-header { background: linear-gradient(180deg, rgba(90,95,114,.07) 0%, transparent 100%); }
    .column[data-status="todo"]        .column-header { background: linear-gradient(180deg, rgba(96,165,250,.06) 0%, transparent 100%); }
    .column[data-status="in_progress"] .column-header { background: linear-gradient(180deg, rgba(74,222,128,.06) 0%, transparent 100%); }
    .column[data-status="review"]      .column-header { background: linear-gradient(180deg, rgba(167,139,250,.06) 0%, transparent 100%); }
    .column[data-status="waiting"]     .column-header { background: linear-gradient(180deg, rgba(251,191,36,.05) 0%, transparent 100%); }
    .column[data-status="done"]        .column-header { background: linear-gradient(180deg, rgba(103,232,249,.05) 0%, transparent 100%); }

    .column-title {
      font-weight: 600; font-size: 0.78rem; text-transform: uppercase;
      letter-spacing: 0.6px; color: var(--text-muted);
    }
    .column-count {
      background: var(--surface3); color: var(--text-muted); padding: 2px 8px;
      border-radius: 999px; font-size: 0.68rem; font-weight: 700;
      min-width: 22px; text-align: center;
    }
    /* Color-coded count badges */
    .column[data-status="backlog"]     .column-count { background: rgba(90,95,114,.15); color: var(--text-dim); }
    .column[data-status="todo"]        .column-count { background: rgba(37,99,235,.15); color: var(--blue-light); }
    .column[data-status="in_progress"] .column-count { background: var(--accent-dim); color: var(--accent-light); }
    .column[data-status="review"]      .column-count { background: rgba(124,58,237,.15); color: var(--purple-light); }
    .column[data-status="waiting"]     .column-count { background: rgba(217,119,6,.12); color: var(--orange-light); }
    .column[data-status="done"]        .column-count { background: rgba(6,182,212,.12); color: var(--cyan-light); }

    .column-body {
      padding: 10px; flex: 1; overflow-y: auto;
      display: flex; flex-direction: column; gap: 8px;
      box-shadow: inset 0 2px 6px rgba(0,0,0,.08);
    }
    .column-body.drag-over {
      background: var(--surface2); border-radius: 0 0 var(--radius) var(--radius);
      box-shadow: inset 0 0 12px rgba(47,124,85,.08);
    }

    /* Empty column state */
    .column-body:empty {
      align-items: center; justify-content: center;
    }
    .column-body:empty::before {
      content: '○'; display: block; text-align: center;
      color: var(--text-dim); font-size: 1.6rem;
      opacity: 0.35; line-height: 1; margin-bottom: 6px;
    }
    .column-body:empty::after {
      content: 'No tasks'; display: block; text-align: center;
      color: var(--text-dim); font-size: 0.72rem;
      letter-spacing: 0.5px; text-transform: uppercase; opacity: 0.4;
    }

    /* Task card */
    .task-card {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: var(--radius-sm); padding: 12px 14px;
      cursor: grab; transition: all .2s ease;
      box-shadow: var(--shadow-card);
      position: relative;
    }
    .task-card:hover {
      border-color: var(--border2); background: var(--surface3);
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(0,0,0,.3), 0 2px 4px rgba(0,0,0,.2);
    }
    .task-card:active { cursor: grabbing; transform: translateY(0); box-shadow: var(--shadow-card); }
    .task-card.dragging { opacity: 0.4; transform: rotate(2deg); }

    /* Left border accent by priority */
    .task-card[data-priority="critical"] { border-left: 3px solid var(--red-light); }
    .task-card[data-priority="high"] { border-left: 3px solid var(--orange-light); }

    .task-ref {
      font-size: 0.7rem; color: var(--text-dim); font-weight: 600;
      font-family: 'SF Mono', 'Fira Code', monospace; letter-spacing: 0.3px;
    }
    .task-title {
      font-size: 0.84rem; font-weight: 500; margin: 5px 0 0;
      line-height: 1.4; color: var(--text);
    }
    .task-meta {
      display: flex; align-items: center; gap: 6px; flex-wrap: wrap; margin-top: 8px;
    }
    .task-project {
      font-size: 0.65rem; padding: 2px 7px; border-radius: 4px;
      font-weight: 600; text-transform: uppercase; letter-spacing: 0.4px;
    }
    .project-kengs-landing { background: var(--accent-dim); color: var(--accent-light); }
    .project-chatkey { background: rgba(124,58,237,.15); color: var(--purple-light); }
    .project-kengs-stories { background: rgba(37,99,235,.15); color: var(--blue-light); }
    .project-aeon-infra { background: rgba(217,119,6,.15); color: var(--orange-light); }
    .project-default { background: var(--surface3); color: var(--text-muted); }

    .priority-badge {
      font-size: 0.65rem; font-weight: 700; padding: 2px 7px;
      border-radius: 4px; text-transform: uppercase; letter-spacing: 0.3px;
    }
    .priority-critical { background: rgba(220,38,38,.15); color: var(--red-light); }
    .priority-high { background: rgba(217,119,6,.12); color: var(--orange-light); }
    .priority-medium { background: var(--surface3); color: var(--text-muted); }
    .priority-low { color: var(--text-dim); }

    .task-tags { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 6px; }
    .task-planning { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 8px; }
    .planning-chip {
      font-size: 0.65rem; padding: 2px 7px; border-radius: 999px;
      background: var(--surface); color: var(--text-muted); border: 1px solid var(--border);
    }
    .planning-chip.due-soon { color: var(--orange-light); border-color: rgba(217,119,6,.45); background: rgba(217,119,6,.08); }
    .planning-chip.overdue { color: var(--red-light); border-color: rgba(220,38,38,.45); background: rgba(220,38,38,.08); }
    .planning-chip.done-chip { color: var(--accent-light); border-color: rgba(74,222,128,.3); background: rgba(74,222,128,.08); }
    .task-tag {
      font-size: 0.62rem; padding: 2px 6px; border-radius: 4px;
      background: var(--surface); color: var(--text-dim); border: 1px solid var(--border);
    }
    .task-assignee {
      font-size: 0.68rem; color: var(--blue-light); font-weight: 500;
      display: flex; align-items: center; gap: 4px;
    }
    .task-assignee .avatar {
      width: 18px; height: 18px; border-radius: 50%;
      background: var(--blue); color: #fff; font-size: 0.55rem;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; flex-shrink: 0;
    }
    .task-assignee.agent .avatar { background: var(--purple); }
    .unassigned { color: var(--text-dim); font-style: italic; }

    /* Modal */
    .modal-overlay {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,.65);
      z-index: 100; align-items: center; justify-content: center;
      backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
    }
    .modal-overlay.active { display: flex; }
    .modal {
      background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 32px; width: 520px; max-width: 92vw; max-height: 85vh; overflow-y: auto;
      box-shadow: var(--shadow-modal);
      animation: modal-in .2s ease-out;
    }
    @keyframes modal-in {
      from { opacity: 0; transform: translateY(12px) scale(.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
    .modal h2 {
      font-size: 1.1rem; margin-bottom: 20px;
      padding-bottom: 12px; border-bottom: 1px solid var(--border);
    }
    .form-group { margin-bottom: 16px; }
    .form-group label {
      display: block; font-size: 0.75rem; color: var(--text-muted);
      margin-bottom: 5px; font-weight: 500; text-transform: uppercase;
      letter-spacing: 0.4px;
    }
    .form-group input, .form-group textarea, .form-group select {
      width: 100%; background: var(--surface2); border: 1px solid var(--border);
      color: var(--text); padding: 9px 12px; border-radius: var(--radius-sm); font-size: 0.88rem;
      font-family: inherit; transition: border-color .15s, box-shadow .15s;
    }
    .form-group textarea { min-height: 80px; resize: vertical; }
    .form-group input:focus, .form-group textarea:focus, .form-group select:focus {
      outline: none; border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(47,124,85,.18);
    }
    .form-actions {
      display: flex; gap: 8px; justify-content: flex-end; margin-top: 24px;
      padding-top: 16px; border-top: 1px solid var(--border);
    }
    .btn-cancel {
      padding: 9px 18px; border-radius: var(--radius-sm); border: 1px solid var(--border);
      background: none; color: var(--text-muted); cursor: pointer; font-size: 0.82rem;
      transition: all .15s;
    }
    .btn-cancel:hover { background: var(--surface2); color: var(--text); border-color: var(--border2); }
    .btn-save {
      padding: 9px 24px; border-radius: var(--radius-sm); border: none;
      background: var(--accent); color: #fff; cursor: pointer; font-size: 0.82rem; font-weight: 600;
      transition: all .15s; box-shadow: 0 2px 8px rgba(47,124,85,.3);
    }
    .btn-save:hover {
      background: var(--accent-light); color: var(--bg);
      transform: translateY(-1px); box-shadow: 0 4px 14px rgba(47,124,85,.35);
    }
    .btn-save:active {
      transform: translateY(0); box-shadow: 0 1px 4px rgba(47,124,85,.2);
    }
    .btn-delete {
      padding: 9px 16px; border-radius: var(--radius-sm); border: 1px solid var(--red);
      background: none; color: var(--red-light); cursor: pointer; font-size: 0.82rem;
      margin-right: auto; transition: all .15s;
    }
    .btn-delete:hover { background: rgba(220,38,38,.15); }

    /* Scrollbar styling for columns */
    .column-body::-webkit-scrollbar { width: 4px; }
    .column-body::-webkit-scrollbar-track { background: transparent; margin: 4px 0; }
    .column-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; transition: background .2s; }
    .column-body::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }
    .column[data-status="todo"]        .column-body::-webkit-scrollbar-thumb:hover { background: rgba(96,165,250,.5); }
    .column[data-status="in_progress"] .column-body::-webkit-scrollbar-thumb:hover { background: rgba(74,222,128,.5); }
    .column[data-status="review"]      .column-body::-webkit-scrollbar-thumb:hover { background: rgba(167,139,250,.5); }
    .column[data-status="waiting"]     .column-body::-webkit-scrollbar-thumb:hover { background: rgba(251,191,36,.5); }
    .column[data-status="done"]        .column-body::-webkit-scrollbar-thumb:hover { background: rgba(103,232,249,.5); }

    /* Column hover glows - subtle accent tint on the top border */
    .column[data-status="backlog"]:hover     { border-color: rgba(90,95,114,.35); }
    .column[data-status="todo"]:hover        { border-color: rgba(96,165,250,.2); }
    .column[data-status="in_progress"]:hover { border-color: rgba(74,222,128,.15); }
    .column[data-status="review"]:hover      { border-color: rgba(167,139,250,.2); }
    .column[data-status="waiting"]:hover     { border-color: rgba(251,191,36,.18); }
    .column[data-status="done"]:hover        { border-color: rgba(103,232,249,.15); }

    /* Focus-visible for keyboard nav */
    .task-card:focus-visible {
      outline: 2px solid var(--accent); outline-offset: 2px;
    }
    .btn-add:focus-visible, .btn-save:focus-visible, .btn-cancel:focus-visible {
      outline: 2px solid var(--accent); outline-offset: 2px;
    }

    /* ── Responsive ─────────────────────────────────────────────────── */
    @media (max-width: 1200px) {
      .board {
        grid-template-columns: repeat(3, 1fr);
      }
      .column { min-height: 220px; }
    }
    @media (max-width: 768px) {
      .toolbar { padding: 16px 16px 0; gap: 8px; }
      .toolbar h1 { width: 100%; font-size: 1.1rem; }
      .filter-group { flex: 1; min-width: 0; }
      .filter-group select { width: 100%; min-width: 0; }
      .search-input { width: 100%; flex: 1; }
      .btn-add { width: 100%; text-align: center; padding: 10px; }
      .board {
        grid-template-columns: 1fr;
        padding: 16px; gap: 12px;
      }
      .column { min-height: 120px; }
      .modal { padding: 24px 20px; }
    }
  </style>
</head>
<body>
  <header>
    <h1>Task Board</h1>
  </header>

  <div class="toolbar">
    <h1>Task Board</h1>
    <div class="filter-group">
      <label>Project</label>
      <select id="filter-project">
        <option value="">All</option>
        <option value="kengs-landing">Keng's Landing</option>
        <option value="chatkey">ChatKey</option>
        <option value="kengs-stories">Keng's Stories</option>
        <option value="aeon-infra">AEON Infra</option>
      </select>
    </div>
    <div class="filter-group">
      <label>Priority</label>
      <select id="filter-priority">
        <option value="">All</option>
        <option value="critical">Critical</option>
        <option value="high">High</option>
        <option value="medium">Medium</option>
        <option value="low">Low</option>
      </select>
    </div>
    <div class="filter-group">
      <label>Assignee</label>
      <select id="filter-assignee">
        <option value="">All</option>
        <option value="unassigned">Unassigned</option>
      </select>
    </div>
    <input class="search-input" id="search" type="text" placeholder="Search tasks…" />
    <button class="btn-add" onclick="openCreateModal()">+ New Task</button>
  </div>

  <div class="board">
    <div class="column" data-status="backlog">
      <div class="column-header">
        <span class="column-title">Backlog</span>
        <span class="column-count" id="count-backlog">0</span>
      </div>
      <div class="column-body" data-status="backlog"></div>
    </div>
    <div class="column" data-status="todo">
      <div class="column-header">
        <span class="column-title">To Do</span>
        <span class="column-count" id="count-todo">0</span>
      </div>
      <div class="column-body" data-status="todo"></div>
    </div>
    <div class="column" data-status="in_progress">
      <div class="column-header">
        <span class="column-title">In Progress</span>
        <span class="column-count" id="count-in_progress">0</span>
      </div>
      <div class="column-body" data-status="in_progress"></div>
    </div>
    <div class="column" data-status="review">
      <div class="column-header">
        <span class="column-title">Review</span>
        <span class="column-count" id="count-review">0</span>
      </div>
      <div class="column-body" data-status="review"></div>
    </div>
    <div class="column" data-status="waiting">
      <div class="column-header">
        <span class="column-title">Waiting / Blocked</span>
        <span class="column-count" id="count-waiting">0</span>
      </div>
      <div class="column-body" data-status="waiting"></div>
    </div>
    <div class="column" data-status="done">
      <div class="column-header">
        <span class="column-title">Done</span>
        <span class="column-count" id="count-done">0</span>
      </div>
      <div class="column-body" data-status="done"></div>
    </div>
  </div>

  <!-- Create / Edit Modal -->
  <div class="modal-overlay" id="task-modal">
    <div class="modal">
      <h2 id="modal-title">New Task</h2>
      <input type="hidden" id="task-id" />
      <div class="form-group">
        <label>Title</label>
        <input type="text" id="task-title" placeholder="What needs to be done?" />
      </div>
      <div class="form-group">
        <label>Description</label>
        <textarea id="task-desc" placeholder="Details, acceptance criteria, notes…"></textarea>
      </div>
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">
        <div class="form-group">
          <label>Status</label>
          <select id="task-status">
            <option value="backlog">Backlog</option>
            <option value="todo">To Do</option>
            <option value="in_progress">In Progress</option>
            <option value="review">Review</option>
            <option value="waiting">Waiting / Blocked</option>
            <option value="done">Done</option>
          </select>
        </div>
        <div class="form-group">
          <label>Priority</label>
          <select id="task-priority">
            <option value="low">Low</option>
            <option value="medium" selected>Medium</option>
            <option value="high">High</option>
            <option value="critical">Critical</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label>Project</label>
        <select id="task-project">
          <option value="">None</option>
          <option value="kengs-landing">Keng's Landing</option>
          <option value="chatkey">ChatKey</option>
          <option value="kengs-stories">Keng's Stories</option>
          <option value="aeon-infra">AEON Infra</option>
        </select>
      </div>
      <div class="form-group">
        <label>Assigned To</label>
        <select id="task-assigned">
          <option value="">Unassigned</option>
        </select>
      </div>
      <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:12px;">
        <div class="form-group">
          <label>Due / Follow-up</label>
          <input type="date" id="task-due" />
        </div>
        <div class="form-group">
          <label>Energy</label>
          <select id="task-effort">
            <option value="">Unset</option>
            <option value="quick">Quick</option>
            <option value="deep">Deep Work</option>
            <option value="errand">Errand</option>
            <option value="call">Call</option>
          </select>
        </div>
        <div class="form-group">
          <label>Context</label>
          <select id="task-context">
            <option value="">Unset</option>
            <option value="computer">Computer</option>
            <option value="phone">Phone</option>
            <option value="home">Home</option>
            <option value="property">Property</option>
            <option value="cpa">CPA</option>
            <option value="vendor">Vendor</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label>Blocked reason / waiting on</label>
        <input type="text" id="task-blocked" placeholder="e.g. waiting on CAD statement, Julie, CPA…" />
      </div>
      <div class="form-group">
        <label>Completion notes (required for Review)</label>
        <textarea id="task-completion-notes" placeholder="What was built, how it was validated, which commits…"></textarea>
      </div>
      <div class="form-group">
        <label>Tags (comma-separated)</label>
        <input type="text" id="task-tags" placeholder="e.g. frontend, bug, tax-prep" />
      </div>
      <div class="form-actions">
        <button class="btn-delete" id="btn-delete" style="display:none" onclick="deleteTask()">Delete</button>
        <button class="btn-cancel" onclick="closeModal()">Cancel</button>
        <button class="btn-save" onclick="saveTask()">Save</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/app-shell.js"></script>
  <script>
    let allTasks = [];
    let editingId = null;
    let workspaceMembers = [];

    const COLUMNS = ['backlog', 'todo', 'in_progress', 'review', 'waiting', 'done'];

    document.addEventListener('DOMContentLoaded', async () => {
      const session = await Auth.requireLogin();
      if (!session) return;

      // Show loading state
      document.querySelectorAll('.column-body').forEach(col => {
        col.innerHTML = '<div style="text-align:center;padding:24px;color:var(--text-dim);font-size:0.82rem;">Loading…</div>';
      });

      await loadMembers();
      await loadTasks();

      // Filters
      document.getElementById('filter-project').addEventListener('change', renderBoard);
      document.getElementById('filter-priority').addEventListener('change', renderBoard);
      document.getElementById('filter-assignee').addEventListener('change', renderBoard);
      document.getElementById('search').addEventListener('input', renderBoard);

      // Drag-and-drop on columns
      document.querySelectorAll('.column-body').forEach(col => {
        col.addEventListener('dragover', e => { e.preventDefault(); col.classList.add('drag-over'); });
        col.addEventListener('dragleave', () => col.classList.remove('drag-over'));
        col.addEventListener('drop', async e => {
          e.preventDefault();
          col.classList.remove('drag-over');
          const taskId = e.dataTransfer.getData('text/plain');
          const newStatus = col.dataset.status;
          await moveTask(taskId, newStatus);
        });
      });
    });

    async function loadTasks() {
      try {
        const workspaceId = await Auth.getWorkspaceId();
        if (!workspaceId) {
          showBoardError('No workspace found. Please log out and log back in.');
          return;
        }
        const resp = await Auth.apiFetch(`/tasks?workspace_id=${workspaceId}`);
        if (!resp.ok) {
          showBoardError(`Failed to load tasks (${resp.status}). Try refreshing the page.`);
          return;
        }
        const json = await resp.json();
        allTasks = json.data || [];
        populateAssigneeDropdowns();
        renderBoard();
      } catch (err) {
        console.error('loadTasks error:', err);
        showBoardError('Could not connect to the API. Check your connection and try again.');
      }
    }

    function showBoardError(msg) {
      document.querySelectorAll('.column-body').forEach(col => {
        col.innerHTML = '';
      });
      // Show error in the first column
      const first = document.querySelector('.column-body');
      if (first) {
        first.innerHTML = `<div style="text-align:center;padding:24px;color:var(--red-light);font-size:0.82rem;">⚠ ${msg}</div>`;
      }
    }

    async function loadMembers() {
      const workspaceId = await Auth.getWorkspaceId();
      try {
        const resp = await Auth.apiFetch(`/workspaces/${workspaceId}/members`);
        if (resp.ok) {
          const json = await resp.json();
          workspaceMembers = (json.data || []).map(m => ({
            ...m,
            display_name: m.display_name || m.role || 'Member',
          }));
        }
      } catch (e) {
        console.warn('Could not load members:', e);
      }
      populateAssigneeDropdowns();
    }

    function populateAssigneeDropdowns() {
      const filterSelect = document.getElementById('filter-assignee');
      const modalSelect = document.getElementById('task-assigned');

      // Also include assigned_to values from tasks that aren't in members (legacy data)
      const memberNames = new Set(workspaceMembers.map(m => m.display_name));
      const taskAssignees = [...new Set(allTasks.map(t => t.assigned_to).filter(Boolean))];
      const extraAssignees = taskAssignees.filter(a => !memberNames.has(a));

      // Rebuild filter dropdown
      filterSelect.innerHTML = '<option value="">All</option><option value="unassigned">Unassigned</option>';
      workspaceMembers.forEach(m => {
        filterSelect.innerHTML += `<option value="${esc(m.display_name)}">${esc(m.display_name)}${m.role === 'agent' ? ' 🤖' : ''}</option>`;
      });
      extraAssignees.forEach(a => {
        filterSelect.innerHTML += `<option value="${esc(a)}">${esc(a)}</option>`;
      });

      // Rebuild modal dropdown
      modalSelect.innerHTML = '<option value="">Unassigned</option>';
      workspaceMembers.forEach(m => {
        modalSelect.innerHTML += `<option value="${esc(m.display_name)}">${esc(m.display_name)}${m.role === 'agent' ? ' 🤖' : ''}</option>`;
      });
      extraAssignees.forEach(a => {
        modalSelect.innerHTML += `<option value="${esc(a)}">${esc(a)}</option>`;
      });
    }

    function getFilteredTasks() {
      const project = document.getElementById('filter-project').value;
      const priority = document.getElementById('filter-priority').value;
      const assignee = document.getElementById('filter-assignee').value;
      const search = document.getElementById('search').value.toLowerCase().trim();

      return allTasks.filter(t => {
        if (project && t.project !== project) return false;
        if (priority && t.priority !== priority) return false;
        if (assignee === 'unassigned' && t.assigned_to) return false;
        if (assignee && assignee !== 'unassigned' && t.assigned_to !== assignee) return false;
        if (search) {
          const haystack = `${t.ref_code} ${t.title} ${t.description || ''} ${t.completion_notes || ''} ${(t.tags || []).join(' ')} ${t.assigned_to || ''}`.toLowerCase();
          if (!haystack.includes(search)) return false;
        }
        return true;
      });
    }

    function renderBoard() {
      const filtered = getFilteredTasks();

      COLUMNS.forEach(status => {
        const col = document.querySelector(`.column-body[data-status="${status}"]`);
        const tasks = filtered.filter(t => t.status === status);
        document.getElementById(`count-${status}`).textContent = tasks.length;

        col.innerHTML = tasks.map(t => `
          <div class="task-card" draggable="true" data-id="${t.id}" data-priority="${t.priority || 'medium'}"
               ondragstart="event.dataTransfer.setData('text/plain','${t.id}'); this.classList.add('dragging')"
               ondragend="this.classList.remove('dragging')"
               onclick="openEditModal('${t.id}')">
            <div class="task-ref">${esc(t.ref_code)}</div>
            <div class="task-title">${esc(t.title)}</div>
            <div class="task-meta">
              ${t.project ? `<span class="task-project ${projectClass(t.project)}">${esc(t.project)}</span>` : ''}
              <span class="priority-badge priority-${t.priority}">${esc(t.priority)}</span>
              ${assigneeBadge(t.assigned_to)}
            </div>
            ${planningChips(t)}
            ${t.tags?.length ? `<div class="task-tags">${t.tags.map(tag => `<span class="task-tag">${esc(tag)}</span>`).join('')}</div>` : ''}
          </div>
        `).join('');
      });
    }

    function projectClass(p) {
      const map = { 'kengs-landing': 'project-kengs-landing', 'chatkey': 'project-chatkey', 'kengs-stories': 'project-kengs-stories', 'aeon-infra': 'project-aeon-infra' };
      return map[p] || 'project-default';
    }

    function assigneeBadge(name) {
      if (!name) return '';
      const isAgent = workspaceMembers.some(m => m.display_name === name && m.role === 'agent');
      const initials = name.split(/[\s-]+/).map(w => w[0]).join('').toUpperCase().slice(0, 2);
      return `<span class="task-assignee${isAgent ? ' agent' : ''}"><span class="avatar">${initials}</span>${esc(name)}</span>`;
    }

    function planningChips(t) {
      const chips = [];
      if (t.due_date) {
        const due = new Date(`${t.due_date}T00:00:00`);
        const today = new Date(); today.setHours(0,0,0,0);
        const diffDays = Math.round((due - today) / 86400000);
        const klass = diffDays < 0 ? 'overdue' : diffDays <= 3 ? 'due-soon' : '';
        chips.push(`<span class="planning-chip ${klass}">📅 ${esc(t.due_date)}</span>`);
      }
      if (t.effort) chips.push(`<span class="planning-chip">⚡ ${esc(t.effort)}</span>`);
      if (t.context) chips.push(`<span class="planning-chip">📍 ${esc(t.context)}</span>`);
      if (t.blocked_reason) chips.push(`<span class="planning-chip overdue">⛔ ${esc(t.blocked_reason)}</span>`);
      if (t.completion_notes) chips.push(`<span class="planning-chip done-chip">✅ ${esc(t.completion_notes.substring(0, 80))}${t.completion_notes.length > 80 ? '…' : ''}</span>`);
      return chips.length ? `<div class="task-planning">${chips.join('')}</div>` : '';
    }

    function esc(s) {
      if (!s) return '';
      const d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }

    function openCreateModal() {
      editingId = null;
      document.getElementById('modal-title').textContent = 'New Task';
      document.getElementById('task-id').value = '';
      document.getElementById('task-title').value = '';
      document.getElementById('task-desc').value = '';
      document.getElementById('task-status').value = 'backlog';
      document.getElementById('task-priority').value = 'medium';
      document.getElementById('task-project').value = '';
      document.getElementById('task-assigned').value = '';
      document.getElementById('task-due').value = '';
      document.getElementById('task-effort').value = '';
      document.getElementById('task-context').value = '';
      document.getElementById('task-blocked').value = '';
      document.getElementById('task-completion-notes').value = '';
      document.getElementById('task-tags').value = '';
      document.getElementById('btn-delete').style.display = 'none';
      document.getElementById('task-modal').classList.add('active');
    }

    function openEditModal(id) {
      const task = allTasks.find(t => t.id === id);
      if (!task) return;
      editingId = id;
      document.getElementById('modal-title').textContent = `Edit ${task.ref_code}`;
      document.getElementById('task-id').value = id;
      document.getElementById('task-title').value = task.title;
      document.getElementById('task-desc').value = task.description || '';
      document.getElementById('task-status').value = task.status;
      document.getElementById('task-priority').value = task.priority;
      document.getElementById('task-project').value = task.project || '';
      document.getElementById('task-assigned').value = task.assigned_to || '';
      document.getElementById('task-due').value = task.due_date || '';
      document.getElementById('task-effort').value = task.effort || '';
      document.getElementById('task-context').value = task.context || '';
      document.getElementById('task-blocked').value = task.blocked_reason || '';
      document.getElementById('task-completion-notes').value = task.completion_notes || '';
      document.getElementById('task-tags').value = (task.tags || []).join(', ');
      document.getElementById('btn-delete').style.display = 'inline-block';
      document.getElementById('task-modal').classList.add('active');
    }

    function closeModal() {
      document.getElementById('task-modal').classList.remove('active');
      editingId = null;
    }

    async function saveTask() {
      const title = document.getElementById('task-title').value.trim();
      if (!title) { alert('Title is required'); return; }

      const body = {
        title,
        description: document.getElementById('task-desc').value.trim() || null,
        status: document.getElementById('task-status').value,
        priority: document.getElementById('task-priority').value,
        project: document.getElementById('task-project').value || null,
        assigned_to: document.getElementById('task-assigned').value || null,
        due_date: document.getElementById('task-due').value || null,
        effort: document.getElementById('task-effort').value || null,
        context: document.getElementById('task-context').value || null,
        blocked_reason: document.getElementById('task-blocked').value.trim() || null,
        completion_notes: document.getElementById('task-completion-notes').value.trim() || null,
        tags: document.getElementById('task-tags').value.split(',').map(s => s.trim()).filter(Boolean),
      };

      if (editingId) {
        const resp = await Auth.apiFetch(`/tasks/${editingId}`, { method: 'PATCH', body: JSON.stringify(body) });
        if (!resp.ok) { alert('Save failed'); return; }
      } else {
        const workspaceId = await Auth.getWorkspaceId();
        body.workspace_id = workspaceId;
        const resp = await Auth.apiFetch('/tasks', { method: 'POST', body: JSON.stringify(body) });
        if (!resp.ok) { alert('Create failed'); return; }
      }

      closeModal();
      await loadTasks();
    }

    async function moveTask(id, newStatus) {
      const resp = await Auth.apiFetch(`/tasks/${id}/move`, {
        method: 'PATCH',
        body: JSON.stringify({ status: newStatus }),
      });
      if (resp.ok) {
        const task = allTasks.find(t => t.id === id);
        if (task) task.status = newStatus;
        renderBoard();
      }
    }

    async function deleteTask() {
      if (!editingId) return;
      if (!confirm('Delete this task?')) return;
      await Auth.apiFetch(`/tasks/${editingId}`, { method: 'DELETE' });
      closeModal();
      await loadTasks();
    }

    // Keyboard shortcuts
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') closeModal();
      if (e.key === 'n' && !e.ctrlKey && !e.metaKey && document.activeElement === document.body) {
        e.preventDefault();
        openCreateModal();
      }
    });
  </script>
</body>
</html>
